<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --line:rgba(6,68,28,0.14);
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.7;}
  a{color:var(--green);}
  header{padding:24px 0; border-bottom:1px solid var(--line); background:var(--green-deep);}
  .wrap{max-width:720px; margin:0 auto; padding:0 28px;}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  .logo-img{height:42px;filter:brightness(0) invert(1);}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-accent); display:inline-block; margin:36px 0 20px;}
  .art-date{font-family:var(--mono); font-size:0.78rem; color:var(--text-accent); text-transform:uppercase; letter-spacing:0.06em;}
  .etape-badge{
    font-family:var(--mono); font-size:0.72rem; text-transform:uppercase; letter-spacing:0.05em;
    background:#ECEFE3; color:var(--text-heading); padding:4px 11px; border-radius:999px;
    display:inline-block; margin-left:10px; vertical-align:middle;
  }
  h1{font-family:var(--display); font-weight:600; color:var(--text-heading); font-size:2rem; margin:10px 0 28px;}
  #cover{width:100%; border-radius:14px; margin-bottom:28px; display:none;}
  #body p{color:var(--text-muted); margin-bottom:18px; font-size:1.02rem;}
  #body h2,#body h3{font-family:var(--display); color:var(--text-heading); margin:28px 0 12px;}
  .video-embed{position:relative; width:100%; aspect-ratio:16/9; border-radius:14px; overflow:hidden; margin-bottom:28px; background:#000;}
  .video-embed iframe{position:absolute; inset:0; width:100%; height:100%; border:0;}
</style>
</head>
<body>
<header>
  <div class="header-wrap">
    <a href="index.html"><img src="assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
  </div>
</header>
<div class="wrap">
  <a class="back" id="back-link" href="projets.html">← Retour au projet</a>
  <noscript><p>L'affichage de cette page nécessite JavaScript. Veuillez l'activer, ou nous écrire à contact@amstc.org.</p></noscript>
  <div id="content">
    <p>Chargement…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const REPO = "mbadji1996-cell/site-amstc";
  const FOLDER = "content/etapes";

  function parseFrontMatter(raw) {
    const match = raw.match(/^---\s*([\s\S]*?)\s*---\s*([\s\S]*)$/);
    if (!match) return { data: {}, body: raw };
    const data = {};
    let currentKey = null;
    match[1].split(/\r?\n/).forEach(line => {
      const keyMatch = line.match(/^([A-Za-z0-9_]+):\s*(.*)$/);
      if (keyMatch) {
        currentKey = keyMatch[1].trim();
        data[currentKey] = keyMatch[2].trim().replace(/^"(.*)"$/, "$1");
      } else if (currentKey && line.trim()) {
        // Ligne de repli YAML (valeur trop longue renvoyée à la ligne par
        // Decap CMS) : on la rattache à la valeur en cours au lieu de la
        // perdre silencieusement.
        data[currentKey] = (data[currentKey] + " " + line.trim()).trim();
      }
    });
    return { data, body: match[2] };
  }

  function youtubeEmbedId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
    return m ? m[1] : null;
  }

  async function loadEtape() {
    const slug = new URLSearchParams(window.location.search).get("slug");
    const content = document.getElementById("content");
    if (!slug) { content.innerHTML = "<p>Étape introuvable.</p>"; return; }
    try {
      const raw = await (await fetch(
        `https://raw.githubusercontent.com/${REPO}/main/${FOLDER}/${slug}.md`
      )).text();
      const { data, body } = parseFrontMatter(raw);
      document.title = (data.title || "Étape") + " - AMSTC";
      if (data.title) {
        document.getElementById('og-title').setAttribute('content', data.title + ' - AMSTC');
      }
      if (data.excerpt) {
        document.getElementById('og-desc').setAttribute('content', data.excerpt);
      }
      if (data.projet) {
        document.getElementById('back-link').href = `projet.html?slug=${encodeURIComponent(data.projet)}`;
      }
      const ytId = youtubeEmbedId(data.video_youtube);
      content.innerHTML = `
        <span class="art-date">${data.date ? new Date(data.date).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) : ''}</span>
        <span class="etape-badge">Étape de projet</span>
        <h1>${data.title || ''}</h1>
        ${data.image ? `<img id="cover" src="${data.image}" style="display:block">` : ""}
        ${ytId ? `<div class="video-embed"><iframe src="https://www.youtube.com/embed/${ytId}" title="Vidéo YouTube" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>` : ""}
        <div id="body">${marked.parse(body || '')}</div>
      `;
    } catch (e) {
      content.innerHTML = "<p>Impossible de charger cette étape.</p>";
    }
  }
  loadEtape();
</script>
</body>
</html>
