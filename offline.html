<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hors ligne - AMSTC</title>
<meta name="robots" content="noindex">
<style>
  :root{
    --ink:#0B2E17; --green-deep:#06441C; --gold:#F8B718;
    --paper:#F6F7F1; --line:rgba(6,68,28,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:-apple-system,'Segoe UI',Inter,sans-serif; color:var(--ink); background:var(--paper);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; text-align:center;
  }
  .card{max-width:420px;}
  img{height:56px; margin-bottom:24px;}
  h1{font-size:1.4rem; color:var(--green-deep); margin-bottom:12px;}
  p{color:#465A4E; font-size:0.98rem; margin-bottom:24px;}
  button{
    font-family:inherit; font-weight:600; font-size:0.95rem; padding:12px 26px; border-radius:999px;
    border:none; background:var(--gold); color:var(--green-deep); cursor:pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <img src="assets/logo-mark-sm.png" alt="AMSTC">
    <h1>Vous êtes hors ligne</h1>
    <p>Cette page n'est pas disponible sans connexion. Reconnectez-vous à internet et réessayez.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
