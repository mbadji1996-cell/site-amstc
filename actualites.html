<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#fff; --line:rgba(6,68,28,0.14);
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line); background:var(--green-deep);}
  .logo-img{height:42px;filter:brightness(0) invert(1);}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-accent); display:inline-block; margin:36px 0 8px;}
  .reports-link{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-accent); display:inline-block; margin:8px 0 24px;}
  .reports-link:hover{color:var(--gold-deep);}
  h1{font-family:var(--display); font-weight:600; color:var(--text-heading); font-size:2.1rem; margin-bottom:40px;}
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; padding-bottom:90px;}
  @media (max-width:880px){ .grid{grid-template-columns:1fr;} }
  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:transform .2s ease, box-shadow .2s ease;}
  .card:hover{transform:translateY(-4px); box-shadow:0 12px 32px rgba(6,68,28,0.10);}
  .card img{width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--paper-alt);}
  .card-body{padding:20px 22px;}
  .card-date{font-family:var(--mono); font-size:0.72rem; color:var(--text-accent); text-transform:uppercase; letter-spacing:0.06em;}
  .card h3{font-family:var(--display); font-size:1.15rem; color:var(--text-heading); margin:8px 0 8px;}
  .card p{font-size:0.92rem; color:var(--text-muted);}
  .card-header-row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .lock-badge{
    font-family:var(--mono); font-size:0.65rem; text-transform:uppercase; letter-spacing:0.04em;
    background:#FEF6E4; color:var(--gold-deep); padding:3px 9px; border-radius:999px; display:inline-flex; align-items:center; gap:4px;
  }
  .empty, .error{color:var(--text-muted); font-family:var(--mono); font-size:0.85rem; padding:20px 0;}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <a href="index.html"><img src="assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
  </div>
</header>
<div class="wrap">
  <a class="back" href="index.html">← Retour à l'accueil</a>
  <h1>Nos réalisations</h1>
  <a class="reports-link" href="rapports/index.html">📊 Voir les bilans annuels</a>
  <noscript><p class="error">L'affichage des actualités nécessite JavaScript. Veuillez l'activer dans votre navigateur, ou nous écrire à contact@amstc.org.</p></noscript>
  <div id="grid" class="grid">
    <p class="empty">Chargement des articles…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
  async function loadArticles() {
    const grid = document.getElementById("grid");
    let publicArticles = [];
    let restrictedTeasers = [];

    try {
      const res = await fetch("content/actualites-index.json");
      if (res.ok) publicArticles = await res.json();
    } catch (e) { /* liste publique indisponible, on continue quand même */ }

    try {
      const { data } = await supabaseClient
        .from("restricted_articles_teasers")
        .select("*")
        .eq("category", "actualite")
        .order("created_at", { ascending: false });
      restrictedTeasers = data || [];
    } catch (e) { /* aperçus réservés indisponibles, on continue quand même */ }

    const items = [
      ...publicArticles.map(a => ({ ...a, _restricted: false, _date: a.date })),
      ...restrictedTeasers.map(a => ({ ...a, _restricted: true, _date: a.created_at, image: a.cover_image }))
    ].sort((a, b) => new Date(b._date || 0) - new Date(a._date || 0));

    if (items.length === 0) {
      grid.innerHTML = '<p class="empty">Aucun article publié pour le moment.</p>';
      return;
    }

    grid.innerHTML = items.map(a => {
      const href = a._restricted
        ? `membres/actualite-reservee.html?id=${encodeURIComponent(a.id)}`
        : `article.html?slug=${encodeURIComponent(a.slug)}`;
      return `
        <a class="card" href="${href}">
          ${a.image ? `<img src="${a.image}" alt="">` : ""}
          <div class="card-body">
            <div class="card-header-row">
              <span class="card-date">${a._date ? new Date(a._date).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) : ''}</span>
              ${a._restricted ? '<span class="lock-badge">🔒 Réservé aux membres</span>' : ''}
            </div>
            <h3>${a.title || 'Sans titre'}</h3>
            <p>${a.excerpt || ''}</p>
          </div>
        </a>
      `;
    }).join("");
  }
  loadArticles();
</script>
</body>
</html>
