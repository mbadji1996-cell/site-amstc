<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#fff; --line:rgba(6,68,28,0.14);
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line);}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px; display:flex; align-items:center; justify-content:space-between;}
  .logo-img{height:42px;}
  .signout-btn{
    font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--gold-deep); background:none; border:1.5px solid var(--line); border-radius:999px;
    padding:9px 18px; cursor:pointer; transition:border-color .18s ease;
  }
  .signout-btn:hover{border-color:var(--gold-deep);}

  .member-tabs{background:var(--green-deep);}
  .member-tabs-inner{max-width:1180px;margin:0 auto;padding:0 28px;display:flex;gap:2px;overflow-x:auto;}
  .member-tab{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.45);padding:14px 18px;border-bottom:2px solid transparent;white-space:nowrap;transition:color .18s;flex-shrink:0;}
  .member-tab:hover{color:rgba(255,255,255,0.8);}
  .member-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-deep); display:inline-block; margin:36px 0 8px;}
  h1{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:2.1rem; margin-bottom:40px;}
  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; padding-bottom:90px;}
  @media (max-width:880px){ .grid{grid-template-columns:1fr;} }
  .card{background:var(--white); border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:transform .2s ease, box-shadow .2s ease;}
  .card:hover{transform:translateY(-4px); box-shadow:0 12px 32px rgba(6,68,28,0.10);}
  .card img{width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--paper-alt);}
  .card-body{padding:20px 22px;}
  .card-header-row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .card-date{font-family:var(--mono); font-size:0.72rem; color:var(--gold-deep); text-transform:uppercase; letter-spacing:0.06em;}
  .lock-badge{
    font-family:var(--mono); font-size:0.65rem; text-transform:uppercase; letter-spacing:0.04em;
    background:#FEF6E4; color:var(--gold-deep); padding:3px 9px; border-radius:999px; display:inline-flex; align-items:center; gap:4px;
  }
  .card h3{font-family:var(--display); font-size:1.15rem; color:var(--green-deep); margin:8px 0 8px;}
  .card p{font-size:0.92rem; color:#465A4E;}
  .empty, .error, .loading{color:#5A6C60; font-family:var(--mono); font-size:0.85rem; padding:20px 0;}
  .card-status-banner{background:var(--white);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .card-status-banner.blocked{border-left-color:#C0392B;}
  .card-status-banner-text{font-size:0.87rem;color:#5A6C60;}
  .card-status-banner-text strong{color:var(--green-deep);}
  .card-status-banner a.btn-renew-link{background:var(--gold);color:var(--green-deep);font-weight:600;font-size:0.85rem;padding:9px 18px;border-radius:999px;white-space:nowrap;}
  footer{padding:40px 0; text-align:center;}
  footer a{color:var(--green); font-family:var(--mono); font-size:0.85rem;}
</style>
</head>
<body>

    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>

<div class="wrap">
  <a class="back" href="index.html">← Espace membres</a>
  <h1>Réalisations</h1>
  <noscript><p class="error">L'affichage nécessite JavaScript. Veuillez l'activer, ou nous écrire à contact@amstc.org.</p></noscript>
  <div class="card-status-banner" id="cardStatusBanner" style="display:none;"></div>
  <div id="grid" class="grid">
    <p class="loading" id="loadingMsg">Vérification de votre accès…</p>
  </div>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  function renderCardStatusBanner(state) {
    const el = document.getElementById("cardStatusBanner");
    if (state === "grace") {
      el.className = "card-status-banner";
      el.innerHTML = '<p class="card-status-banner-text"><strong>Votre carte a expiré.</strong> Renouvelez avant le 1er mars pour garder l\'accès aux contenus réservés.</p><a class="btn-renew-link" href="profil.html?open=validity">Renouveler ma carte →</a>';
      el.style.display = "";
    } else if (state === "blocked") {
      el.className = "card-status-banner blocked";
      el.innerHTML = '<p class="card-status-banner-text"><strong>Accès aux contenus réservés suspendu.</strong> Votre carte est expirée depuis plus de 2 mois.</p><a class="btn-renew-link" href="profil.html?open=validity">Renouveler ma carte →</a>';
      el.style.display = "";
    } else {
      el.style.display = "none";
    }
  }

  async function loadArticles(blocked) {
    const grid = document.getElementById("grid");
    let publicArticles = [];
    let restricted = [];

    try {
      const res = await fetch("../content/actualites-index.json");
      if (res.ok) publicArticles = await res.json();
    } catch (e) { /* liste publique indisponible, on continue quand même */ }

    if (!blocked) {
      try {
        const { data } = await supabaseClient
          .from("restricted_articles")
          .select("id,title,excerpt,cover_image,created_at")
          .eq("category", "actualite")
          .order("created_at", { ascending: false });
        restricted = data || [];
      } catch (e) { /* contenu réservé indisponible, on continue quand même */ }
    }

    const items = [
      ...publicArticles.map(a => ({ ...a, _restricted: false, _date: a.date })),
      ...restricted.map(a => ({ ...a, _restricted: true, _date: a.created_at, image: a.cover_image }))
    ].sort((a, b) => new Date(b._date || 0) - new Date(a._date || 0));

    if (items.length === 0) {
      grid.innerHTML = '<p class="empty">Aucun article publié pour le moment.</p>';
      return;
    }

    grid.innerHTML = items.map(a => {
      const href = a._restricted
        ? `actualite-reservee.html?id=${encodeURIComponent(a.id)}`
        : `../article.html?slug=${encodeURIComponent(a.slug)}`;
      return `
        <a class="card" href="${href}">
          ${a.image ? `<img src="${a.image}" alt="">` : ""}
          <div class="card-body">
            <div class="card-header-row">
              <span class="card-date">${a._date ? new Date(a._date).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) : ''}</span>
              ${a._restricted ? '<span class="lock-badge">🔒 Réservé aux membres</span>' : ''}
            </div>
            <h3>${a.title || 'Sans titre'}</h3>
            <p>${a.excerpt || ''}</p>
          </div>
        </a>
      `;
    }).join("");
  }

  (async () => {
    const result = await requireActiveMember("connexion.html");
    if (!result) return;
    document.getElementById("signoutBtn").style.display = "";
    renderCardStatusBanner(result.state);
    loadArticles(result.state === "blocked");
  })();

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut();
    window.location.href = "connexion.html";
  });
</script>

</body>
</html>
