<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - Espace Membres - AMSTC</title>
<meta name="description" content="Connectez-vous à l'espace membres de l'AMSTC.">
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/connexion.html">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="../assets/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="../assets/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="../assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --shadow:0 12px 32px rgba(6,68,28,0.10); --radius:14px;
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:520px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line);}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  .logo-img{height:42px;}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-deep); display:inline-block; margin:40px 0 18px;}
  .eyebrow{font-family:var(--mono); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-deep); display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .eyebrow::before{content:""; width:22px; height:1px; background:var(--gold-deep);}
  h1{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:clamp(1.7rem,4vw,2.2rem); margin-bottom:14px;}
  .intro{color:#3C4E44; font-size:1rem; margin-bottom:32px;}
  .card{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:28px 30px; margin-bottom:22px;}
  label{display:block; font-size:0.85rem; font-weight:600; color:var(--green-deep); margin-top:16px;}
  label:first-child{margin-top:0;}
  input{
    width:100%; padding:12px 14px; margin-top:6px; border:1.5px solid var(--line); border-radius:10px;
    font-family:var(--body); font-size:0.95rem; color:var(--ink); background:var(--paper);
  }
  input:focus{outline:2px solid var(--green); outline-offset:1px; border-color:var(--green);}
  .password-field{position:relative; margin-top:6px;}
  .password-field input{padding-right:44px; margin-top:0;}
  .toggle-password{position:absolute; right:6px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#8A9E8F; padding:6px; display:flex; align-items:center;}
  .toggle-password:hover{color:var(--green);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; font-size:0.95rem;
    padding:13px 24px; border-radius:999px; border:none; cursor:pointer; width:100%; margin-top:24px;
    background:var(--gold); color:var(--green-deep); transition:background .18s ease;
  }
  .btn:hover{background:var(--gold-deep); color:var(--white);}
  .btn:disabled{opacity:0.6; cursor:not-allowed;}
  .form-message{margin-top:18px; padding:12px 14px; border-radius:10px; font-size:0.9rem; display:none;}
  .form-message.error{background:#FDEEEE; color:#B23B3B; display:block;}
  .form-message.success{background:var(--paper-alt); color:var(--green-deep); display:block;}
  .form-message.pending{background:#FEF6E4; color:var(--gold-deep); display:block;}
  .alt-link{text-align:center; font-size:0.9rem; color:#5A6C60; margin-top:8px;}
  .alt-link a{color:var(--green); font-weight:600;}
  .or-divider{display:flex; align-items:center; gap:14px; margin:22px 0; color:#8A9E8F; font-size:0.85rem;}
  .or-divider::before,.or-divider::after{content:""; flex:1; height:1px; background:var(--line);}
  .btn-google{background:var(--white); color:var(--ink); border:1.5px solid var(--line); margin-top:0; gap:10px;}
  .btn-google:hover{background:var(--paper-alt); color:var(--ink);}
  footer{padding:40px 0; text-align:center;}
  footer a{color:var(--green); font-family:var(--mono); font-size:0.85rem;}
</style>
</head>
<body>

<header>
  <div class="header-wrap">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
  </div>
</header>

<div class="wrap">
  <a class="back" href="../index.html">← Retour à l'accueil</a>

  <p class="eyebrow">Espace Membres</p>
  <h1>Connexion</h1>
  <p class="intro">Accédez à votre espace membre.</p>

  <div class="card">
    <form id="loginForm">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required autocomplete="email">

      <label for="password">Mot de passe</label>
      <div class="password-field">
        <input type="password" id="password" name="password" required autocomplete="current-password">
        <button type="button" class="toggle-password" data-target="password" aria-label="Afficher le mot de passe">
          <svg class="icon-eye" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-off" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.06-6.06M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>

      <button type="submit" class="btn" id="submitBtn">Se connecter</button>
      <div class="form-message" id="formMessage"></div>
    </form>
  </div>

  <div class="or-divider"><span>ou</span></div>

  <!-- Bouton Google - nécessite d'activer le provider Google dans Supabase Dashboard
       → Authentication → Providers → Google, et d'ajouter
       https://amstc.org/membres/connexion.html dans URL Configuration → Redirect URLs -->
  <button class="btn btn-google" id="googleBtn" type="button">
    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908C16.658 14.017 17.64 11.71 17.64 9.2z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Se connecter avec Google
  </button>

  <div class="form-message" id="googleMessage"></div>

  <p class="alt-link" style="margin-top:24px;"><a href="mot-de-passe-oublie.html">Mot de passe oublié ?</a></p>
  <p class="alt-link">Pas encore de compte ? <a href="inscription.html">S'inscrire</a></p>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  const form = document.getElementById("loginForm");
  const submitBtn = document.getElementById("submitBtn");
  const googleBtn = document.getElementById("googleBtn");
  const messageEl = document.getElementById("formMessage");
  const googleMessageEl = document.getElementById("googleMessage");

  document.querySelectorAll(".toggle-password").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      btn.querySelector(".icon-eye").style.display = show ? "none" : "";
      btn.querySelector(".icon-eye-off").style.display = show ? "" : "none";
      btn.setAttribute("aria-label", show ? "Masquer le mot de passe" : "Afficher le mot de passe");
    });
  });

  function showMessage(text, type, el) {
    const target = el || messageEl;
    target.textContent = text;
    target.className = "form-message " + type;
  }

  // Vérifie le profil et redirige ou affiche le message d'erreur approprié.
  // Retourne true si redirigé, false si bloqué.
  async function handleProfile(profile, msgEl) {
    if (!profile) {
      showMessage("Impossible de récupérer votre profil. Réessayez ou contactez-nous.", "error", msgEl);
      await signOut();
      return false;
    }
    if (profile.status === "pending") {
      showMessage("Votre compte est en attente de validation par un administrateur. Vous recevrez un accès dès approbation.", "pending", msgEl);
      await signOut();
      return false;
    }
    if (profile.status === "rejected") {
      showMessage("Votre demande d'inscription n'a pas été approuvée. Contactez-nous à contact@amstc.org pour plus d'informations.", "error", msgEl);
      await signOut();
      return false;
    }
    if (profile.is_active === false) {
      showMessage("Votre compte a été désactivé. Contactez-nous à contact@amstc.org pour plus d'informations.", "error", msgEl);
      await signOut();
      return false;
    }
    window.location.href = "index.html";
    return true;
  }

  // Après un redirect OAuth, Supabase remet la session dans l'URL.
  // On vérifie dès le chargement de la page.
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) return;
    const profile = await getCurrentProfile();
    await handleProfile(profile, googleMessageEl);
  })();

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    messageEl.className = "form-message";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const { error: signInError } = await supabaseClient.auth.signInWithPassword({ email, password });

    if (signInError) {
      showMessage(signInError.message || "Identifiants incorrects.", "error");
      submitBtn.disabled = false;
      return;
    }

    const profile = await getCurrentProfile();
    const ok = await handleProfile(profile, messageEl);
    if (!ok) submitBtn.disabled = false;
  });

  googleBtn.addEventListener("click", async () => {
    googleBtn.disabled = true;
    googleMessageEl.className = "form-message";
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: "google",
      options: {
        redirectTo: window.location.origin + "/membres/connexion.html",
        // Google garde sa propre session dans le navigateur, indépendante de
        // Supabase : sans ce paramètre, se déconnecter puis recliquer ici
        // ré-authentifie silencieusement le même compte Google au lieu de
        // laisser choisir un autre compte.
        queryParams: { prompt: "select_account" }
      }
    });
    if (error) {
      showMessage("Erreur lors de la connexion Google. Réessayez.", "error", googleMessageEl);
      googleBtn.disabled = false;
    }
    // Si pas d'erreur, Supabase redirige vers Google - pas besoin de ré-activer le bouton.
  });
</script>

</body>
</html>
