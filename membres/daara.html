<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace Daara - AMSTC</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/daara.html">
<link rel="icon" href="../assets/logo-horizontal-sm.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --radius:14px;
    --display:'Sora',sans-serif; --body:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
    --teal-light:#E1F5EE; --teal:#1D9E75; --teal-dark:#0F6E56;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.6;}
  a{color:inherit;text-decoration:none;}

  header{background:var(--green-deep);padding:0;}
  .header-inner{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
  .logo-img{height:38px;}
  .signout-btn{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.7);background:none;border:1px solid rgba(255,255,255,0.25);border-radius:999px;padding:7px 16px;cursor:pointer;transition:border-color .18s;}
  .signout-btn:hover{border-color:rgba(255,255,255,0.6);}

  /* Hero */
  .hero{background:var(--green-deep);padding:32px 0 40px;}
  .hero-inner{max-width:900px;margin:0 auto;padding:0 24px;}
  .back{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;}
  .back:hover{color:var(--gold);}
  .hero-icon{width:52px;height:52px;border-radius:12px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--teal-dark);margin-bottom:14px;}
  .hero h1{font-family:var(--display);font-size:clamp(1.6rem,4vw,2rem);font-weight:600;color:var(--white);margin-bottom:6px;}
  .hero-sub{color:rgba(255,255,255,0.6);font-size:0.95rem;}

  /* Main */
  .wrap{max-width:900px;margin:0 auto;padding:0 24px;}

  /* Category tabs */
  .cat-tabs{display:flex;gap:10px;padding:24px 0 20px;}
  .cat-tab{font-family:var(--body);font-size:0.9rem;font-weight:600;padding:9px 22px;border-radius:999px;border:1.5px solid var(--line);background:var(--white);color:#5A6C60;cursor:pointer;transition:all .18s;}
  .cat-tab.active{background:var(--teal-light);border-color:var(--teal);color:var(--teal-dark);}
  .cat-tab:hover:not(.active){border-color:var(--teal);color:var(--teal-dark);}

  /* Course list */
  .courses-grid{display:flex;flex-direction:column;gap:12px;padding-bottom:60px;}
  .course-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:16px;transition:box-shadow .18s,transform .18s;}
  .course-card:hover{box-shadow:0 6px 20px rgba(6,68,28,0.09);transform:translateY(-2px);}
  .course-thumb{width:52px;height:52px;border-radius:10px;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--teal-dark);flex-shrink:0;}
  .course-body{flex:1;min-width:0;}
  .course-title{font-family:var(--display);font-size:1rem;font-weight:600;color:var(--green-deep);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .course-desc{font-size:0.85rem;color:#5A6C60;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .course-meta{display:flex;align-items:center;gap:14px;}
  .course-duration{font-family:var(--mono);font-size:0.72rem;color:#8A9E8F;display:flex;align-items:center;gap:4px;}
  .prog-row{display:flex;align-items:center;gap:8px;flex:1;}
  .prog-bar{flex:1;height:4px;background:var(--paper-alt);border-radius:2px;}
  .prog-fill{height:100%;border-radius:2px;background:var(--teal);transition:width .4s ease;}
  .prog-label{font-family:var(--mono);font-size:0.7rem;color:#8A9E8F;min-width:30px;}
  .completed-badge{font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.04em;background:#EAF3DE;color:#3B6D11;padding:3px 8px;border-radius:999px;}
  .course-arrow{font-size:20px;color:#c0ccc5;flex-shrink:0;}

  /* Empty / loading */
  .empty{color:#5A6C60;font-family:var(--mono);font-size:0.85rem;padding:40px 0;text-align:center;}

  footer{padding:40px 0;text-align:center;}
  footer a{color:var(--green);font-family:var(--mono);font-size:0.82rem;}

  @media(max-width:500px){
    .course-card{flex-wrap:wrap;}
    .course-thumb{width:40px;height:40px;font-size:18px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
    <button class="signout-btn" id="signoutBtn" style="display:none;">Se déconnecter</button>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> Espace membres</a>
    <div class="hero-icon"><i class="ti ti-book"></i></div>
    <h1>Espace Daara</h1>
    <p class="hero-sub">Cours en ligne — Islam & Tarikha</p>
  </div>
</div>

<div class="wrap">
  <p class="empty" id="loadingMsg">Chargement des cours…</p>

  <div id="pageContent" style="display:none;">
    <div class="cat-tabs">
      <button class="cat-tab active" id="tab-islam" onclick="setCategory('islam')">
        <i class="ti ti-moon"></i> Islam
      </button>
      <button class="cat-tab" id="tab-tarikha" onclick="setCategory('tarikha')">
        <i class="ti ti-star"></i> Tarikha
      </button>
    </div>

    <div class="courses-grid" id="coursesList"></div>
  </div>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  let allCourses = [];
  let progressMap = {};
  let currentUserId = null;
  let currentCategory = 'islam';

  (async () => {
    const profile = await requireApprovedMember('connexion.html');
    if (!profile) return;

    currentUserId = profile.id;
    document.getElementById('signoutBtn').style.display = '';

    await loadData();
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('pageContent').style.display = '';
    renderCourses();
  })();

  async function loadData() {
    const [coursesRes, progressRes] = await Promise.all([
      supabaseClient.from('daara_courses').select('*').eq('is_published', true).order('category').order('order_index'),
      supabaseClient.from('daara_progress').select('*').eq('user_id', currentUserId)
    ]);
    allCourses = coursesRes.data || [];
    (progressRes.data || []).forEach(p => { progressMap[p.course_id] = p; });
  }

  function setCategory(cat) {
    currentCategory = cat;
    ['islam', 'tarikha'].forEach(c => {
      document.getElementById('tab-' + c).classList.toggle('active', c === cat);
    });
    renderCourses();
  }

  function renderCourses() {
    const list = document.getElementById('coursesList');
    const filtered = allCourses.filter(c => c.category === currentCategory);

    if (filtered.length === 0) {
      list.innerHTML = '<p class="empty">Aucun cours disponible pour le moment.</p>';
      return;
    }

    list.innerHTML = filtered.map(course => {
      const prog = progressMap[course.id];
      const pct = prog ? prog.progress_pct : 0;
      const done = pct === 100;
      const durationLabel = course.duration_min ? course.duration_min + ' min' : '';

      return `
        <a class="course-card" href="cours.html?id=${encodeURIComponent(course.id)}">
          <div class="course-thumb">
            <i class="ti ti-book"></i>
          </div>
          <div class="course-body">
            <p class="course-title">${escHtml(course.title)}</p>
            <p class="course-desc">${escHtml(course.description || '')}</p>
            <div class="course-meta">
              ${durationLabel ? `<span class="course-duration"><i class="ti ti-clock"></i>${durationLabel}</span>` : ''}
              ${done
                ? '<span class="completed-badge"><i class="ti ti-check"></i> Terminé</span>'
                : `<div class="prog-row">
                    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
                    <span class="prog-label">${pct}%</span>
                  </div>`
              }
            </div>
          </div>
          <i class="ti ti-chevron-right course-arrow"></i>
        </a>`;
    }).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('signoutBtn').addEventListener('click', async () => {
    await signOut();
    window.location.href = 'connexion.html';
  });
</script>

</body>
</html>
