<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion Boutique - Admin AMSTC</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../assets/logo-horizontal-sm.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --radius:14px;
    --display:'Sora',sans-serif; --body:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
    --amber-light:#FAEEDA; --amber:#D4870A; --amber-dark:#854F0B; --amber-deeper:#5C360A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.6;}
  a{color:inherit;text-decoration:none;}

  header{background:var(--green-deep);}
  .header-inner{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
  .logo-img{height:38px;filter:brightness(0) invert(1);}
  .signout-btn{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.7);background:none;border:1px solid rgba(255,255,255,0.25);border-radius:999px;padding:7px 16px;cursor:pointer;}
  .signout-btn:hover{border-color:rgba(255,255,255,0.6);}

  .wrap{max-width:980px;margin:0 auto;padding:0 24px 80px;}
  .page-header{padding:32px 0 20px;}
  .back{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--gold-deep);display:inline-flex;align-items:center;gap:6px;margin-bottom:8px;}
  .back:hover{opacity:0.75;}
  .page-title{font-family:var(--display);font-size:1.6rem;font-weight:600;color:var(--green-deep);}

  /* Main tabs */
  .main-tabs{display:flex;gap:0;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;width:fit-content;margin-bottom:24px;}
  .main-tab{font-size:0.88rem;font-weight:600;padding:9px 22px;background:var(--white);color:#5A6C60;cursor:pointer;border:none;border-right:1px solid var(--line);}
  .main-tab:last-child{border-right:none;}
  .main-tab.active{background:var(--amber-dark);color:var(--white);}

  /* Toolbar */
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:0.88rem;padding:9px 18px;border-radius:999px;border:none;cursor:pointer;transition:all .18s;}
  .btn-primary{background:var(--amber-dark);color:var(--white);}
  .btn-primary:hover{background:var(--amber-deeper);}
  .btn-sm{padding:6px 12px;font-size:0.78rem;}
  .btn-edit{background:var(--amber-light);color:var(--amber-dark);}
  .btn-edit:hover{background:#f0ddb8;}
  .btn-pub{background:var(--paper-alt);color:#5A6C60;}
  .btn-pub:hover{background:#DDE5D0;}
  .btn-danger{background:#FDEEEE;color:#B23B3B;}
  .btn-danger:hover{background:#f5c0c0;}
  .btn:disabled{opacity:0.5;cursor:not-allowed;}

  /* Filter bar (orders) */
  .filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .filter-btn{font-size:0.82rem;font-weight:600;padding:7px 16px;border-radius:999px;border:1.5px solid var(--line);background:var(--white);color:#5A6C60;cursor:pointer;}
  .filter-btn.active{background:var(--amber-dark);border-color:var(--amber-dark);color:var(--white);}

  /* Products grid */
  .products-list{display:flex;flex-direction:column;gap:10px;}
  .product-row{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:14px;}
  .prod-thumb{width:52px;height:52px;border-radius:9px;background:var(--amber-light);display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--amber-dark);flex-shrink:0;overflow:hidden;}
  .prod-thumb img{width:100%;height:100%;object-fit:cover;}
  .prod-body{flex:1;min-width:0;}
  .prod-name{font-family:var(--display);font-size:0.95rem;font-weight:600;color:var(--green-deep);}
  .prod-meta{font-size:0.8rem;color:#5A6C60;margin-top:2px;}
  .prod-price{font-family:var(--mono);font-size:0.9rem;font-weight:600;color:var(--amber-dark);flex-shrink:0;min-width:90px;text-align:right;}
  .prod-actions{display:flex;gap:6px;flex-shrink:0;}
  .badge-active{font-family:var(--mono);font-size:0.6rem;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:#EAF3DE;color:#3B6D11;margin-left:6px;}
  .badge-inactive{background:var(--paper-alt);color:#8A9E8F;}

  /* Orders table */
  .table-wrap{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  th{font-family:var(--mono);font-size:0.64rem;text-transform:uppercase;letter-spacing:0.08em;color:#8A9E8F;padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);background:var(--paper);}
  td{padding:12px 14px;font-size:0.86rem;border-bottom:1px solid var(--paper-alt);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tr:hover td{background:var(--paper);}
  .badge{font-family:var(--mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.04em;padding:3px 9px;border-radius:999px;}
  .s-pending{background:#FEF6E4;color:var(--gold-deep);}
  .s-paid{background:#EAF3DE;color:#3B6D11;}
  .s-processing{background:var(--amber-light);color:var(--amber-dark);}
  .s-shipped{background:#E6F1FB;color:#185FA5;}
  .s-cancelled{background:#FDEEEE;color:#B23B3B;}
  .order-items{font-size:0.78rem;color:#5A6C60;}
  .order-total{font-family:var(--mono);font-weight:600;color:var(--amber-dark);}
  .member-name{font-weight:600;color:var(--green-deep);}
  .member-email{font-size:0.76rem;color:#8A9E8F;}
  .ref-code{font-family:var(--mono);font-size:0.78rem;color:#5A6C60;}
  .status-select{font-family:var(--mono);font-size:0.75rem;border:1px solid var(--line);border-radius:6px;padding:4px 6px;background:var(--white);cursor:pointer;}
  .empty-row td{text-align:center;color:#8A9E8F;font-family:var(--mono);font-size:0.82rem;padding:32px;}
  .loading-msg{padding:80px 0;text-align:center;color:#5A6C60;font-family:var(--mono);font-size:0.85rem;}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(6,28,14,0.55);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:24px 16px;overflow-y:auto;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--white);border-radius:var(--radius);padding:28px;width:100%;max-width:560px;position:relative;}
  .modal-title{font-family:var(--display);font-size:1.2rem;font-weight:600;color:var(--green-deep);margin-bottom:20px;}
  .modal-close{position:absolute;top:16px;right:16px;background:var(--paper);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:#5A6C60;}
  .modal-close:hover{background:var(--paper-alt);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  .form-group.full{grid-column:1/-1;}
  label{font-family:var(--mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:#5A6C60;}
  input,select,textarea{font-family:var(--body);font-size:0.9rem;border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--ink);background:var(--paper);width:100%;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber);}
  .form-check{display:flex;align-items:center;gap:8px;font-size:0.9rem;cursor:pointer;}
  .form-check input[type=checkbox]{width:auto;}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--paper-alt);}
  .form-msg{font-size:0.85rem;margin-top:8px;}
  .form-msg.error{color:#B23B3B;}
  .form-msg.ok{color:#3B6D11;}

  /* Order detail modal */
  .order-detail-table{width:100%;border-collapse:collapse;margin:14px 0;}
  .order-detail-table td{padding:6px 0;font-size:0.87rem;border-bottom:1px solid var(--paper-alt);}
  .order-detail-table td:last-child{text-align:right;font-family:var(--mono);color:var(--amber-dark);}
  .order-detail-table tr:last-child td{border:none;font-weight:700;}

  @media(max-width:600px){.form-grid{grid-template-columns:1fr;}.table-wrap{overflow-x:auto;}}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
    <button class="signout-btn" id="signoutBtn" style="display:none;">Se déconnecter</button>
  </div>
</header>

<div class="wrap">
  <p class="loading-msg" id="loadingMsg">Vérification des droits…</p>

  <div id="pageContent" style="display:none;">
    <div class="page-header">
      <a class="back" href="admin.html"><i class="ti ti-arrow-left"></i> Centre d'administration</a>
      <h1 class="page-title">Boutique - Administration</h1>
    </div>

    <div class="main-tabs">
      <button class="main-tab active" id="tab-products" onclick="switchMain('products')"><i class="ti ti-package"></i> Produits</button>
      <button class="main-tab" id="tab-orders" onclick="switchMain('orders')"><i class="ti ti-receipt"></i> Commandes</button>
    </div>

    <!-- PRODUCTS panel -->
    <div id="panel-products">
      <div class="toolbar">
        <span style="font-family:var(--mono);font-size:0.78rem;color:#8A9E8F;" id="productCount">0 produit(s)</span>
        <button class="btn btn-primary" onclick="openProductModal(null)"><i class="ti ti-plus"></i> Nouveau produit</button>
      </div>
      <div class="products-list" id="productsList"></div>
    </div>

    <!-- ORDERS panel -->
    <div id="panel-orders" style="display:none;">
      <div class="filter-bar">
        <button class="filter-btn active" id="of-all" onclick="setOrderFilter('all')">Toutes</button>
        <button class="filter-btn" id="of-pending" onclick="setOrderFilter('pending')">En attente</button>
        <button class="filter-btn" id="of-paid" onclick="setOrderFilter('paid')">Payées</button>
        <button class="filter-btn" id="of-processing" onclick="setOrderFilter('processing')">En traitement</button>
        <button class="filter-btn" id="of-shipped" onclick="setOrderFilter('shipped')">Expédiées</button>
        <button class="filter-btn" id="of-cancelled" onclick="setOrderFilter('cancelled')">Annulées</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Membre</th>
              <th>Articles</th>
              <th>Total</th>
              <th>Paiement</th>
              <th>Référence</th>
              <th>Date</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ordersTable">
            <tr class="empty-row"><td colspan="8">Chargement…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-bg" id="productModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('productModal')"><i class="ti ti-x"></i></button>
    <h2 class="modal-title" id="productModalTitle">Nouveau produit</h2>
    <div class="form-grid">
      <div class="form-group full">
        <label>Nom du produit *</label>
        <input type="text" id="p-name" placeholder="Ex : Blouse médicale AMSTC">
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <input type="text" id="p-cat" placeholder="Ex : Vestimentaire">
      </div>
      <div class="form-group">
        <label>Prix (FCFA) *</label>
        <input type="number" id="p-price" min="0" placeholder="5000">
      </div>
      <div class="form-group">
        <label>Stock (laisser vide = illimité)</label>
        <input type="number" id="p-stock" min="0" placeholder="-">
      </div>
      <div class="form-group full">
        <label>Description</label>
        <textarea id="p-desc" rows="3" placeholder="Description courte du produit…"></textarea>
      </div>
      <div class="form-group full">
        <label>URL de l'image</label>
        <input type="text" id="p-img" placeholder="https://…">
      </div>
      <div class="form-group full">
        <label class="form-check">
          <input type="checkbox" id="p-active" checked>
          Produit actif (visible en boutique)
        </label>
      </div>
    </div>
    <p class="form-msg" id="productFormMsg"></p>
    <div class="form-actions">
      <button class="btn btn-pub" onclick="closeModal('productModal')">Annuler</button>
      <button class="btn btn-primary" id="productSaveBtn" onclick="saveProduct()"><i class="ti ti-device-floppy"></i> Enregistrer</button>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-bg" id="orderModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('orderModal')"><i class="ti ti-x"></i></button>
    <h2 class="modal-title">Détail de la commande</h2>
    <div id="orderDetailContent"></div>
  </div>
</div>

<footer style="padding:40px 0;text-align:center;">
  <a href="../index.html" style="color:var(--green);font-family:var(--mono);font-size:0.82rem;">AMSTC</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  let allProducts = [], allOrders = [];
  let editingProductId = null, orderFilter = 'all';
  const methods = { wave: 'Wave', orange_money: 'Orange Money' };
  const statusLabels = { pending: 'En attente', paid: 'Payée', processing: 'En traitement', shipped: 'Expédiée', cancelled: 'Annulée' };

  (async () => {
    const profile = await requireAdmin('connexion.html');
    if (!profile) return;
    document.getElementById('signoutBtn').style.display = '';
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('pageContent').style.display = '';
    await loadData();
    renderProducts();
  })();

  async function loadData() {
    const [pRes, oRes] = await Promise.all([
      supabaseClient.from('products').select('*').order('category').order('created_at'),
      supabaseClient.from('orders').select('*, profiles:user_id(full_name, email)').order('created_at', { ascending: false })
    ]);
    allProducts = pRes.data || [];
    allOrders = oRes.data || [];
  }

  function switchMain(tab) {
    ['products','orders'].forEach(t => {
      document.getElementById('tab-' + t).classList.toggle('active', t === tab);
      document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
    });
    if (tab === 'products') renderProducts();
    else renderOrders();
  }

  // ---- PRODUCTS ----
  function renderProducts() {
    document.getElementById('productCount').textContent = allProducts.length + ' produit(s)';
    const list = document.getElementById('productsList');
    if (allProducts.length === 0) {
      list.innerHTML = '<p style="color:#8A9E8F;font-family:var(--mono);font-size:0.82rem;padding:32px 0;text-align:center;">Aucun produit. Ajoutez-en un.</p>';
      return;
    }
    list.innerHTML = allProducts.map(p => {
      const imgHtml = p.image_url
        ? `<img src="${escHtml(p.image_url)}" alt="">`
        : `<i class="ti ti-package"></i>`;
      return `<div class="product-row">
        <div class="prod-thumb">${imgHtml}</div>
        <div class="prod-body">
          <p class="prod-name">${escHtml(p.name)}<span class="badge-active ${p.is_active ? '' : 'badge-inactive'}">${p.is_active ? 'Actif' : 'Inactif'}</span></p>
          <p class="prod-meta">${p.category ? escHtml(p.category) + ' · ' : ''}${p.stock !== null ? p.stock + ' en stock' : 'Stock illimité'}</p>
        </div>
        <span class="prod-price">${formatPrice(p.price)}</span>
        <div class="prod-actions">
          <button class="btn btn-sm btn-edit" onclick="openProductModal('${p.id}')"><i class="ti ti-pencil"></i> Modifier</button>
          <button class="btn btn-sm btn-pub" onclick="toggleProductActive('${p.id}',${p.is_active})">${p.is_active ? '<i class="ti ti-eye-off"></i>' : '<i class="ti ti-eye"></i>'}</button>
          <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}','${escHtml(p.name)}')"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    }).join('');
  }

  function openProductModal(id) {
    editingProductId = id;
    document.getElementById('productFormMsg').textContent = '';
    if (id) {
      const p = allProducts.find(x => x.id === id);
      document.getElementById('productModalTitle').textContent = 'Modifier le produit';
      document.getElementById('p-name').value = p.name;
      document.getElementById('p-cat').value = p.category || '';
      document.getElementById('p-price').value = p.price;
      document.getElementById('p-stock').value = p.stock !== null ? p.stock : '';
      document.getElementById('p-desc').value = p.description || '';
      document.getElementById('p-img').value = p.image_url || '';
      document.getElementById('p-active').checked = !!p.is_active;
    } else {
      document.getElementById('productModalTitle').textContent = 'Nouveau produit';
      ['p-name','p-cat','p-price','p-stock','p-desc','p-img'].forEach(f => document.getElementById(f).value = '');
      document.getElementById('p-active').checked = true;
    }
    document.getElementById('productModal').classList.add('open');
  }

  async function saveProduct() {
    const btn = document.getElementById('productSaveBtn');
    const msg = document.getElementById('productFormMsg');
    const name = document.getElementById('p-name').value.trim();
    const price = parseFloat(document.getElementById('p-price').value);
    if (!name) { msg.textContent = 'Le nom est obligatoire.'; msg.className = 'form-msg error'; return; }
    if (isNaN(price) || price < 0) { msg.textContent = 'Le prix doit être un nombre valide.'; msg.className = 'form-msg error'; return; }
    btn.disabled = true;

    const stockVal = document.getElementById('p-stock').value.trim();
    const payload = {
      name,
      category: document.getElementById('p-cat').value.trim() || null,
      price,
      stock: stockVal !== '' ? parseInt(stockVal) : null,
      description: document.getElementById('p-desc').value.trim() || null,
      image_url: document.getElementById('p-img').value.trim() || null,
      is_active: document.getElementById('p-active').checked
    };

    let error;
    if (editingProductId) {
      ({ error } = await supabaseClient.from('products').update(payload).eq('id', editingProductId));
    } else {
      ({ error } = await supabaseClient.from('products').insert(payload));
    }

    btn.disabled = false;
    if (error) { msg.textContent = 'Erreur : ' + error.message; msg.className = 'form-msg error'; return; }
    msg.textContent = 'Enregistré !'; msg.className = 'form-msg ok';
    await loadData(); renderProducts();
    setTimeout(() => closeModal('productModal'), 700);
  }

  async function toggleProductActive(id, current) {
    await supabaseClient.from('products').update({ is_active: !current }).eq('id', id);
    await loadData(); renderProducts();
  }

  async function deleteProduct(id, name) {
    if (!confirm(`Supprimer le produit "${name}" ?`)) return;
    await supabaseClient.from('products').delete().eq('id', id);
    await loadData(); renderProducts();
  }

  // ---- ORDERS ----
  function setOrderFilter(f) {
    orderFilter = f;
    ['all','pending','paid','processing','shipped','cancelled'].forEach(k =>
      document.getElementById('of-' + k).classList.toggle('active', k === f));
    renderOrders();
  }

  function renderOrders() {
    const items = orderFilter === 'all' ? allOrders : allOrders.filter(o => o.status === orderFilter);
    const tbody = document.getElementById('ordersTable');
    if (items.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="8">Aucune commande.</td></tr>';
      return;
    }
    tbody.innerHTML = items.map(o => {
      const profile = o.profiles || {};
      const itemsArr = Array.isArray(o.items) ? o.items : (o.items ? JSON.parse(o.items) : []);
      const itemsSummary = itemsArr.map(i => `${i.qty}× ${escHtml(i.name)}`).join(', ');
      const date = o.created_at ? new Date(o.created_at).toLocaleDateString('fr-FR') : '-';
      return `<tr>
        <td>
          <p class="member-name">${escHtml(profile.full_name || '-')}</p>
          <p class="member-email">${escHtml(profile.email || '')}</p>
        </td>
        <td><p class="order-items">${itemsSummary || '-'}</p></td>
        <td><span class="order-total">${formatPrice(o.total)}</span></td>
        <td style="font-size:0.8rem;">${methods[o.payment_method] || '-'}</td>
        <td><span class="ref-code">${escHtml(o.payment_reference || '-')}</span></td>
        <td style="color:#8A9E8F;font-size:0.78rem;">${date}</td>
        <td>
          <select class="status-select" onchange="updateOrderStatus('${o.id}',this.value)">
            ${['pending','paid','processing','shipped','cancelled'].map(s =>
              `<option value="${s}" ${o.status===s?'selected':''}>${statusLabels[s]}</option>`
            ).join('')}
          </select>
        </td>
        <td>
          <button class="btn btn-sm btn-edit" onclick="showOrderDetail('${o.id}')"><i class="ti ti-eye"></i></button>
        </td>
      </tr>`;
    }).join('');
  }

  async function updateOrderStatus(id, status) {
    await supabaseClient.from('orders').update({ status }).eq('id', id);
    await loadData(); renderOrders();
  }

  function showOrderDetail(id) {
    const o = allOrders.find(x => x.id === id);
    if (!o) return;
    const profile = o.profiles || {};
    const itemsArr = Array.isArray(o.items) ? o.items : (o.items ? JSON.parse(o.items) : []);
    const date = o.created_at ? new Date(o.created_at).toLocaleString('fr-FR') : '-';

    document.getElementById('orderDetailContent').innerHTML = `
      <div style="margin-bottom:14px;">
        <p style="font-family:var(--mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:#8A9E8F;margin-bottom:4px;">Membre</p>
        <p style="font-weight:600;color:var(--green-deep);">${escHtml(profile.full_name || '-')}</p>
        <p style="font-size:0.82rem;color:#8A9E8F;">${escHtml(profile.email || '')}</p>
      </div>
      <table class="order-detail-table">
        ${itemsArr.map(i => `<tr><td>${escHtml(i.name)} × ${i.qty}</td><td>${formatPrice(i.price * i.qty)}</td></tr>`).join('')}
        <tr><td style="font-weight:600;">Total</td><td>${formatPrice(o.total)}</td></tr>
      </table>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.85rem;color:#5A6C60;margin-top:10px;">
        <div><strong style="color:var(--ink);">Méthode</strong><br>${methods[o.payment_method] || '-'}</div>
        <div><strong style="color:var(--ink);">Référence</strong><br><span style="font-family:var(--mono);">${escHtml(o.payment_reference || '-')}</span></div>
        <div><strong style="color:var(--ink);">Date</strong><br>${date}</div>
        <div><strong style="color:var(--ink);">Statut</strong><br><span class="badge s-${o.status}">${statusLabels[o.status]}</span></div>
        ${o.delivery_address ? `<div style="grid-column:1/-1;"><strong style="color:var(--ink);">Livraison</strong><br>${escHtml(o.delivery_address)}</div>` : ''}
        ${o.note ? `<div style="grid-column:1/-1;"><strong style="color:var(--ink);">Note</strong><br>${escHtml(o.note)}</div>` : ''}
      </div>`;
    document.getElementById('orderModal').classList.add('open');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  function formatPrice(n) { return new Intl.NumberFormat('fr-FR').format(n || 0) + ' FCFA'; }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  document.getElementById('signoutBtn').addEventListener('click', async () => {
    await signOut(); window.location.href = 'connexion.html';
  });

  ['productModal','orderModal'].forEach(id =>
    document.getElementById(id).addEventListener('click', e => {
      if (e.target === document.getElementById(id)) closeModal(id);
    })
  );
</script>

</body>
</html>
