<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum - AMSTC</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/forum.html">
<link rel="icon" href="../assets/logo-horizontal-sm.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --radius:14px;
    --display:'Sora',sans-serif; --body:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
    --violet-light:#EFE8FB; --violet:#7C5CBF; --violet-dark:#5A3F94; --violet-deeper:#3D2A67;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.6;}
  a{color:inherit;text-decoration:none;}

  header{background:var(--green-deep);}
  .header-inner{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
  .logo-img{height:38px;filter:brightness(0) invert(1);}
  .signout-btn{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.7);background:none;border:1px solid rgba(255,255,255,0.25);border-radius:999px;padding:7px 16px;cursor:pointer;}
  .signout-btn:hover{border-color:rgba(255,255,255,0.6);}

  .member-tabs{background:var(--green-deep);border-top:1px solid rgba(255,255,255,0.08);}
  .member-tabs-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;justify-content:safe center;gap:2px;overflow-x:auto;}
  .member-tab{font-family:var(--mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);padding:14px 14px;border-bottom:2px solid transparent;white-space:nowrap;transition:color .18s;flex-shrink:0;}
  .member-tab:hover{color:rgba(255,255,255,0.8);}
  .member-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

  .hero{background:var(--green-deep);padding:32px 0 40px;}
  .hero-inner{max-width:900px;margin:0 auto;padding:0 24px;}
  .back{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;}
  .back:hover{color:var(--gold);}
  .hero-icon{width:52px;height:52px;border-radius:12px;background:var(--violet-light);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--violet-dark);margin-bottom:14px;}
  .hero h1{font-family:var(--display);font-size:clamp(1.6rem,4vw,2rem);font-weight:600;color:var(--white);margin-bottom:6px;}
  .hero-sub{color:rgba(255,255,255,0.6);font-size:0.95rem;}

  .wrap{max-width:900px;margin:0 auto;padding:0 24px;}

  .toolbar{padding:24px 0 16px;display:flex;justify-content:flex-end;}
  .btn{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:0.88rem;padding:11px 20px;border-radius:999px;border:none;cursor:pointer;transition:all .18s;}
  .btn-primary{background:var(--violet-dark);color:var(--white);}
  .btn-primary:hover{background:var(--violet-deeper);}
  .btn-outline{background:transparent;color:#5A6C60;border:1.5px solid var(--line);}
  .btn-outline:hover{border-color:var(--violet);color:var(--violet-dark);}
  .btn:disabled{opacity:0.6;cursor:not-allowed;}

  .new-topic-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;margin-bottom:24px;display:none;}
  .new-topic-card.open{display:block;}
  .new-topic-card label{font-family:var(--mono);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--gold-deep);display:block;margin:12px 0 6px;}
  .new-topic-card label:first-child{margin-top:0;}
  .new-topic-card input,.new-topic-card textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:8px;font-family:var(--body);font-size:0.92rem;color:var(--ink);background:var(--paper);resize:vertical;}
  .new-topic-card input:focus,.new-topic-card textarea:focus{outline:none;border-color:var(--violet);}
  .new-topic-card textarea{min-height:110px;}
  .new-topic-actions{display:flex;gap:10px;align-items:center;margin-top:16px;}
  .form-msg{font-size:0.85rem;}
  .form-msg.error{color:#B23B3B;}

  .topics-list{display:flex;flex-direction:column;gap:10px;padding-bottom:60px;}
  .topic-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;display:flex;align-items:center;gap:14px;transition:box-shadow .18s,transform .18s;}
  .topic-card:hover{box-shadow:0 6px 20px rgba(6,68,28,0.08);transform:translateY(-2px);}
  .topic-icon{width:44px;height:44px;border-radius:10px;background:var(--violet-light);display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--violet-dark);flex-shrink:0;}
  .topic-body{flex:1;min-width:0;}
  .topic-title{font-family:var(--display);font-size:0.98rem;font-weight:600;color:var(--green-deep);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .topic-excerpt{font-size:0.82rem;color:#5A6C60;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px;}
  .topic-meta{display:flex;align-items:center;gap:12px;font-family:var(--mono);font-size:0.72rem;color:#8A9E8F;}
  .topic-meta span{display:flex;align-items:center;gap:4px;}
  .topic-arrow{font-size:18px;color:#c0ccc5;flex-shrink:0;}

  .empty{color:#5A6C60;font-family:var(--mono);font-size:0.85rem;padding:40px 0;text-align:center;}

  footer{padding:40px 0;text-align:center;}
  footer a{color:var(--green);font-family:var(--mono);font-size:0.82rem;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
    <button class="signout-btn" id="signoutBtn" style="display:none;">Se déconnecter</button>
  </div>
</header>

<nav class="member-tabs">
  <div class="member-tabs-inner">
    <a class="member-tab" href="index.html">Tableau de bord</a>
    <a class="member-tab" href="formations.html">Formations</a>
    <a class="member-tab" href="actualites.html">Réalisations</a>
    <a class="member-tab" href="documents.html">Documents officiels</a>
    <a class="member-tab" href="boutique.html">Boutique AMSTC</a>
    <a class="member-tab active" href="forum.html">Forum</a>
    <a class="member-tab" href="mediatheque.html">Médiathèque</a>
    <a class="member-tab" href="profil.html">Mon Profil & Adhésion</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> Espace membres</a>
    <div class="hero-icon"><i class="ti ti-messages"></i></div>
    <h1>Forum</h1>
    <p class="hero-sub">Posez vos questions, échangez avec les autres membres de l'association</p>
  </div>
</div>

<div class="wrap">
  <p class="empty" id="loadingMsg">Chargement…</p>

  <div id="pageContent" style="display:none;">
    <div class="toolbar">
      <button class="btn btn-primary" id="newTopicBtn"><i class="ti ti-plus"></i> Nouveau sujet</button>
    </div>

    <div class="new-topic-card" id="newTopicCard">
      <label for="ntTitle">Titre</label>
      <input type="text" id="ntTitle" placeholder="Ex : Question sur l'organisation de la prochaine caravane médicale">
      <label for="ntBody">Message</label>
      <textarea id="ntBody" placeholder="Détaillez votre question ou votre sujet de discussion…"></textarea>
      <div class="new-topic-actions">
        <button class="btn btn-primary" id="ntSubmitBtn"><i class="ti ti-send"></i> Publier</button>
        <button class="btn btn-outline" id="ntCancelBtn">Annuler</button>
        <p class="form-msg" id="ntMsg"></p>
      </div>
    </div>

    <div class="topics-list" id="topicsList"></div>
  </div>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  let currentProfile = null;

  function esc(s){ return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  function timeAgo(dateStr) {
    const diffSec = Math.round((Date.now() - new Date(dateStr).getTime()) / 1000);
    if (diffSec < 60) return "à l'instant";
    const diffMin = Math.round(diffSec / 60);
    if (diffMin < 60) return `il y a ${diffMin} min`;
    const diffH = Math.round(diffMin / 60);
    if (diffH < 24) return `il y a ${diffH} h`;
    const diffJ = Math.round(diffH / 24);
    if (diffJ < 30) return `il y a ${diffJ} j`;
    return new Date(dateStr).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  async function loadTopics() {
    const list = document.getElementById('topicsList');
    const { data, error } = await supabaseClient
      .from('forum_topics')
      .select('id,title,body,last_activity_at,reply_count,profiles:author_id(full_name)')
      .order('last_activity_at', { ascending: false });

    if (error) {
      list.innerHTML = '<p class="empty">Impossible de charger le forum pour le moment.</p>';
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = '<p class="empty">Aucun sujet pour le moment. Soyez le premier à en lancer un !</p>';
      return;
    }

    list.innerHTML = data.map(t => `
      <a class="topic-card" href="forum-sujet.html?id=${encodeURIComponent(t.id)}">
        <div class="topic-icon"><i class="ti ti-message-circle-2"></i></div>
        <div class="topic-body">
          <div class="topic-title">${esc(t.title)}</div>
          <div class="topic-excerpt">${esc((t.body || '').slice(0, 140))}</div>
          <div class="topic-meta">
            <span><i class="ti ti-user"></i> ${esc(t.profiles ? t.profiles.full_name : 'Membre')}</span>
            <span><i class="ti ti-message"></i> ${t.reply_count} réponse${t.reply_count > 1 ? 's' : ''}</span>
            <span><i class="ti ti-clock"></i> ${timeAgo(t.last_activity_at)}</span>
          </div>
        </div>
        <i class="ti ti-chevron-right topic-arrow"></i>
      </a>
    `).join('');
  }

  function toggleNewTopicForm(open) {
    document.getElementById('newTopicCard').classList.toggle('open', open);
    if (!open) {
      document.getElementById('ntTitle').value = '';
      document.getElementById('ntBody').value = '';
      document.getElementById('ntMsg').textContent = '';
      document.getElementById('ntMsg').className = 'form-msg';
    }
  }

  async function submitNewTopic() {
    const title = document.getElementById('ntTitle').value.trim();
    const body = document.getElementById('ntBody').value.trim();
    const msg = document.getElementById('ntMsg');
    if (!title || !body) {
      msg.textContent = 'Le titre et le message sont obligatoires.';
      msg.className = 'form-msg error';
      return;
    }

    const btn = document.getElementById('ntSubmitBtn');
    btn.disabled = true;
    const { error } = await supabaseClient.from('forum_topics').insert({
      author_id: currentProfile.id,
      title,
      body,
    });
    btn.disabled = false;

    if (error) {
      msg.textContent = 'Erreur : ' + error.message;
      msg.className = 'form-msg error';
      return;
    }

    toggleNewTopicForm(false);
    await loadTopics();
  }

  (async () => {
    const profile = await requireApprovedMember('connexion.html');
    if (!profile) return;
    currentProfile = profile;
    document.getElementById('signoutBtn').style.display = '';
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('pageContent').style.display = '';
    await loadTopics();
  })();

  document.getElementById('newTopicBtn').addEventListener('click', () => toggleNewTopicForm(true));
  document.getElementById('ntCancelBtn').addEventListener('click', () => toggleNewTopicForm(false));
  document.getElementById('ntSubmitBtn').addEventListener('click', submitNewTopic);

  document.getElementById('signoutBtn').addEventListener('click', async () => {
    await signOut();
    window.location.href = 'connexion.html';
  });
</script>

</body>
</html>
