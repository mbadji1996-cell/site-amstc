<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('amstc-theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<script src="../assets/js/theme-toggle.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Album - Médiathèque AMSTC</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/mediatheque-dossier.html">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="../assets/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="../assets/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="../assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --line:rgba(6,68,28,0.14);
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:var(--green);}
  header{padding:24px 0; border-bottom:1px solid var(--line);}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px; display:flex; align-items:center; justify-content:space-between;}
  .logo-img{height:42px;}
  .signout-btn{
    font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--text-accent); background:none; border:1.5px solid var(--line); border-radius:999px;
    padding:9px 18px; cursor:pointer; transition:border-color .18s ease;
  }
  .signout-btn:hover{border-color:var(--text-accent);}
  .wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-accent); display:inline-block; margin:36px 0 8px; text-decoration:none;}
  .breadcrumb{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-accent); margin:36px 0 8px; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .breadcrumb a{color:var(--text-accent);}
  .breadcrumb a:hover{opacity:0.75;}
  .breadcrumb span.sep{color:#B0BFB5;}
  .breadcrumb span.current{color:#5A6C60;}
  h1{font-family:var(--display); font-weight:600; color:var(--text-heading); font-size:1.9rem; margin-bottom:6px;}
  .folder-meta{color:#5A6C60; font-family:var(--mono); font-size:0.82rem; margin-bottom:28px;}

  .subfolders-label{font-family:var(--mono); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-accent); margin-bottom:14px;}
  .subfolders-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-bottom:32px;}
  .subfolder-card{background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:box-shadow .18s,transform .18s;}
  .subfolder-card:hover{box-shadow:0 8px 24px rgba(6,68,28,0.1); transform:translateY(-3px);}
  .subfolder-cover{width:100%; aspect-ratio:4/3; object-fit:cover; background:var(--paper); display:block;}
  .subfolder-cover-placeholder{width:100%; aspect-ratio:4/3; background:var(--paper); display:flex; align-items:center; justify-content:center; font-size:28px; color:var(--text-accent);}
  .subfolder-body{padding:12px 14px;}
  .subfolder-title{font-family:var(--display); font-size:0.92rem; font-weight:600; color:var(--text-heading);}

  .photos-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; padding-bottom:80px;}
  .photo-thumb{width:100%; aspect-ratio:1; object-fit:cover; border-radius:10px; cursor:pointer; background:var(--paper); display:block; border:1px solid var(--line); transition:transform .15s ease;}
  .photo-thumb:hover{transform:scale(1.02);}

  .empty, .loading{color:#5A6C60; font-family:var(--mono); font-size:0.85rem; padding:20px 0;}

  /* Lightbox */
  .lightbox{position:fixed; inset:0; background:rgba(6,20,12,0.92); z-index:400; display:none; align-items:center; justify-content:center;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:92vw; max-height:88vh; object-fit:contain; border-radius:6px;}
  .lightbox-close{position:absolute; top:20px; right:24px; background:none; border:none; color:var(--white,#fff); font-size:30px; cursor:pointer; line-height:1;}
  .lightbox-nav{position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); border:none; color:#fff; width:48px; height:48px; border-radius:50%; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .lightbox-nav:hover{background:rgba(255,255,255,0.22);}
  .lightbox-prev{left:20px;}
  .lightbox-next{right:20px;}
  .lightbox-counter{position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.7); font-family:var(--mono); font-size:0.8rem;}

  footer{padding:40px 0; text-align:center; max-width:1180px; margin:0 auto;}
  footer a{color:var(--green); font-family:var(--mono); font-size:0.85rem;}
</style>
</head>
<body>

<header>
  <div class="header-wrap">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
    <button class="signout-btn" id="signoutBtn" style="display:none;">Se déconnecter</button>
  </div>
</header>

<div class="wrap">
  <p class="breadcrumb" id="breadcrumb"><a href="mediatheque.html">← Médiathèque</a></p>
  <noscript><p class="loading">L'affichage nécessite JavaScript. Veuillez l'activer, ou nous écrire à contact@amstc.org.</p></noscript>
  <div id="content">
    <p class="loading" id="loadingMsg">Chargement de l'album…</p>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose"><i class="ti ti-x"></i></button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev"><i class="ti ti-chevron-left"></i></button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" id="lightboxNext"><i class="ti ti-chevron-right"></i></button>
  <p class="lightbox-counter" id="lightboxCounter"></p>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  const MEDIA_BUCKET = "mediatheque-photos";
  const folderId = new URLSearchParams(location.search).get("id");
  let photoUrls = [];
  let lightboxIndex = 0;

  function esc(s){ return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  async function buildBreadcrumb(folder) {
    const crumbs = [];
    let current = folder;
    while (current && current.parent_id) {
      const { data: parent } = await supabaseClient.from("media_folders").select("id,title,parent_id").eq("id", current.parent_id).single();
      if (!parent) break;
      crumbs.unshift(parent);
      current = parent;
    }
    const el = document.getElementById("breadcrumb");
    const links = crumbs.map(c => `<a href="mediatheque-dossier.html?id=${encodeURIComponent(c.id)}">${esc(c.title)}</a>`);
    el.innerHTML = ['<a href="mediatheque.html">Médiathèque</a>', ...links, `<span class="current">${esc(folder.title)}</span>`]
      .map((html, i) => i === 0 ? html : `<span class="sep">/</span>${html}`)
      .join(' ');
  }

  async function loadFolder() {
    const content = document.getElementById("content");
    if (!folderId) { content.innerHTML = '<p class="empty">Album introuvable.</p>'; return; }

    const [folderRes, photosRes, subfoldersRes] = await Promise.all([
      supabaseClient.from("media_folders").select("*").eq("id", folderId).single(),
      supabaseClient.from("media_photos").select("*").eq("folder_id", folderId).order("order_index"),
      supabaseClient.from("media_folders").select("id,title,cover_path").eq("parent_id", folderId).eq("is_published", true).order("created_at"),
    ]);

    if (!folderRes.data) { content.innerHTML = '<p class="empty">Impossible de charger cet album.</p>'; return; }
    const folder = folderRes.data;
    const photos = photosRes.data || [];
    const subfolders = subfoldersRes.data || [];

    document.title = folder.title + " - Médiathèque AMSTC";
    await buildBreadcrumb(folder);

    const subfolderCoverPaths = subfolders.filter(f => f.cover_path).map(f => f.cover_path);
    let subCoverByPath = {};
    if (subfolderCoverPaths.length > 0) {
      const { data: signedCovers } = await supabaseClient.storage.from(MEDIA_BUCKET).createSignedUrls(subfolderCoverPaths, 3600);
      (signedCovers || []).forEach(s => { if (s.signedUrl) subCoverByPath[s.path] = s.signedUrl; });
    }

    const subfoldersHtml = subfolders.length === 0 ? '' : `
      <p class="subfolders-label"><i class="ti ti-folder"></i> Sous-dossiers</p>
      <div class="subfolders-grid">
        ${subfolders.map(f => {
          const cover = f.cover_path && subCoverByPath[f.cover_path];
          return `
            <a class="subfolder-card" href="mediatheque-dossier.html?id=${encodeURIComponent(f.id)}">
              ${cover ? `<img class="subfolder-cover" src="${cover}" alt="" loading="lazy">` : `<div class="subfolder-cover-placeholder"><i class="ti ti-photo"></i></div>`}
              <div class="subfolder-body"><p class="subfolder-title">${esc(f.title)}</p></div>
            </a>`;
        }).join('')}
      </div>`;

    if (photos.length === 0) {
      content.innerHTML = `
        <h1>${esc(folder.title)}</h1>
        <p class="folder-meta">${folder.year}</p>
        ${subfoldersHtml}
        ${subfolders.length === 0 ? '<p class="empty">Aucune photo dans cet album pour le moment.</p>' : ''}`;
      document.getElementById("loadingMsg").style.display = "none";
      return;
    }

    const paths = photos.map(p => p.storage_path);
    const { data: signed } = await supabaseClient.storage.from(MEDIA_BUCKET).createSignedUrls(paths, 3600);
    const signedByPath = {};
    (signed || []).forEach(s => { if (s.signedUrl) signedByPath[s.path] = s.signedUrl; });
    photoUrls = photos.map(p => signedByPath[p.storage_path]).filter(Boolean);

    content.innerHTML = `
      <h1>${esc(folder.title)}</h1>
      <p class="folder-meta">${folder.year} - ${photos.length} photo${photos.length > 1 ? 's' : ''}</p>
      ${subfoldersHtml}
      <div class="photos-grid" id="photosGrid">
        ${photoUrls.map((url, i) => `<img class="photo-thumb" src="${url}" alt="" loading="lazy" onclick="openLightbox(${i})">`).join('')}
      </div>`;

    document.getElementById("loadingMsg").style.display = "none";
  }

  function openLightbox(index) {
    lightboxIndex = index;
    renderLightbox();
    document.getElementById("lightbox").classList.add("open");
  }

  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("open");
  }

  function renderLightbox() {
    document.getElementById("lightboxImg").src = photoUrls[lightboxIndex];
    document.getElementById("lightboxCounter").textContent = `${lightboxIndex + 1} / ${photoUrls.length}`;
  }

  function lightboxPrev() {
    lightboxIndex = (lightboxIndex - 1 + photoUrls.length) % photoUrls.length;
    renderLightbox();
  }

  function lightboxNext() {
    lightboxIndex = (lightboxIndex + 1) % photoUrls.length;
    renderLightbox();
  }

  document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
  document.getElementById("lightboxPrev").addEventListener("click", lightboxPrev);
  document.getElementById("lightboxNext").addEventListener("click", lightboxNext);
  document.getElementById("lightbox").addEventListener("click", (e) => {
    if (e.target.id === "lightbox") closeLightbox();
  });
  document.addEventListener("keydown", (e) => {
    if (!document.getElementById("lightbox").classList.contains("open")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") lightboxPrev();
    if (e.key === "ArrowRight") lightboxNext();
  });

  (async () => {
    const profile = await requireApprovedMember("connexion.html");
    if (!profile) return;
    document.getElementById("signoutBtn").style.display = "";
    await loadFolder();
  })();

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut();
    window.location.href = "connexion.html";
  });
</script>

</body>
</html>
