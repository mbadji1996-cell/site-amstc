<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bibliothèque - Espace Membres - AMSTC</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/bibliotheque.html">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="../assets/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="../assets/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="../assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --shadow:0 12px 32px rgba(6,68,28,0.10); --radius:14px;
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:820px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line);}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px; display:flex; align-items:center; justify-content:space-between;}
  .logo-img{height:42px;}
  .signout-btn{
    font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--gold-deep); background:none; border:1.5px solid var(--line); border-radius:999px;
    padding:9px 18px; cursor:pointer; transition:border-color .18s ease;
  }
  .signout-btn:hover{border-color:var(--gold-deep);}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-deep); display:inline-block; margin:36px 0 8px;}
  .eyebrow{font-family:var(--mono); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-deep); display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .eyebrow::before{content:""; width:22px; height:1px; background:var(--gold-deep);}
  h1{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:clamp(1.7rem,4vw,2.2rem); margin-bottom:14px;}
  .intro{color:#3C4E44; font-size:1.02rem; margin-bottom:32px;}
  .bib-section{padding:28px 0 8px;}
  .bib-section:first-child{padding-top:0;}
  .bib-section-title{font-family:var(--display);font-size:1.15rem;font-weight:700;color:var(--green-deep);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .bib-section-title::after{content:"";flex:1;height:1px;background:var(--line);}
  .book-item{margin-bottom:14px;}
  .book-row{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:20px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  }
  .book-main{display:flex; align-items:flex-start; gap:16px; min-width:0;}
  .book-cover{width:52px; height:70px; object-fit:cover; border-radius:6px; flex-shrink:0; background:var(--paper-alt);}
  .book-cover-placeholder{
    width:52px; height:70px; border-radius:6px; flex-shrink:0; background:var(--paper-alt);
    display:flex; align-items:center; justify-content:center; color:var(--gold-deep); font-size:18px;
  }
  .book-title{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:1.05rem;}
  .book-excerpt{color:#465A4E; font-size:0.92rem; margin-top:4px;}
  .book-date{font-family:var(--mono); font-size:0.75rem; color:#5A6C60; margin-top:6px;}
  .btn-view{
    font-weight:600; font-size:0.85rem; padding:10px 20px; border-radius:999px; border:none; cursor:pointer;
    background:var(--gold); color:var(--green-deep); flex-shrink:0; transition:opacity .15s ease;
  }
  .btn-view:hover{opacity:0.88;}
  .btn-view:disabled{opacity:0.6; cursor:wait;}
  .book-viewer{
    border:1px solid var(--line); border-top:none; border-radius:0 0 var(--radius) var(--radius);
    margin-top:-14px; padding-top:14px; background:var(--white);
  }
  .book-viewer iframe{width:100%; height:75vh; border:0; display:block;}
  .book-viewer-note{
    font-family:var(--mono); font-size:0.72rem; color:#5A6C60; text-align:center; padding:8px 0;
  }
  .empty, .error, .loading{color:#5A6C60; font-family:var(--mono); font-size:0.85rem; padding:20px 0;}
  .card-status-banner{background:var(--white);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:14px 18px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;}
  .card-status-banner.blocked{border-left-color:#C0392B;}
  .card-status-banner-text{font-size:0.87rem;color:#5A6C60;}
  .card-status-banner-text strong{color:var(--green-deep);}
  .card-status-banner a.btn-renew-link{background:var(--gold);color:var(--green-deep);font-weight:600;font-size:0.85rem;padding:9px 18px;border-radius:999px;white-space:nowrap;}
  footer{padding:40px 0; text-align:center;}
  footer a{color:var(--green); font-family:var(--mono); font-size:0.85rem;}
</style>
</head>
<body>

<header>
  <div class="header-wrap">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
    <button class="signout-btn" id="signoutBtn" style="display:none;">Se déconnecter</button>
  </div>
</header>

<div class="wrap">
  <a class="back" href="formations.html">← Formations</a>
  <p class="eyebrow">Espace Membres - Formations & Daara</p>
  <h1><i class="ti ti-books"></i> Bibliothèque</h1>
  <p class="intro">Livres et documents réservés aux membres, consultables en ligne. Ce contenu n'est pas téléchargeable.</p>
  <noscript><p class="error">L'affichage nécessite JavaScript. Veuillez l'activer, ou nous écrire à contact@amstc.org.</p></noscript>
  <div class="card-status-banner" id="cardStatusBanner" style="display:none;"></div>
  <div id="list">
    <p class="loading" id="loadingMsg">Vérification de votre accès…</p>
  </div>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  const DOCUMENTS_BUCKET = "documents-reserves";
  const BIB_SECTIONS = [
    { slug: "islam", label: "Islam" },
    { slug: "medecine", label: "Médecine" },
    { slug: "pharmacie", label: "Pharmacie" },
    { slug: "odontologie", label: "Odontologie" },
    { slug: "soins-infirmiers-obstetricaux", label: "Soins infirmiers et obstétricaux" },
    { slug: "entrepreneuriat", label: "Entrepreneuriat" },
    { slug: "developpement-personnel", label: "Développement personnel" },
    { slug: "autres", label: "Autres" },
  ];
  function esc(s){ return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function formatDate(d){
    return d ? new Date(d).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" }) : "";
  }

  function renderCardStatusBanner(state) {
    const el = document.getElementById("cardStatusBanner");
    if (state === "grace") {
      el.className = "card-status-banner";
      el.innerHTML = '<p class="card-status-banner-text"><strong>Votre carte a expiré.</strong> Renouvelez avant le 1er mars pour garder l\'accès aux contenus réservés.</p><a class="btn-renew-link" href="profil.html?open=validity">Renouveler ma carte →</a>';
      el.style.display = "";
    } else if (state === "blocked") {
      el.className = "card-status-banner blocked";
      el.innerHTML = '<p class="card-status-banner-text"><strong>Accès aux contenus réservés suspendu.</strong> Votre carte est expirée depuis plus de 2 mois.</p><a class="btn-renew-link" href="profil.html?open=validity">Renouveler ma carte →</a>';
      el.style.display = "";
    } else {
      el.style.display = "none";
    }
  }

  async function loadBooks(blocked) {
    const listEl = document.getElementById("list");
    if (blocked) {
      listEl.innerHTML = '<p class="empty">Bibliothèque verrouillée le temps de renouveler votre carte.</p>';
      return;
    }
    const { data, error } = await supabaseClient.rpc("bibliotheque_documents");

    if (error) {
      listEl.innerHTML = `<p class="error">${esc(error.message && error.message.includes('Trop de requêtes') ? error.message : "Impossible de charger la bibliothèque pour le moment.")}</p>`;
      return;
    }

    if (!data || data.length === 0) {
      listEl.innerHTML = '<p class="empty">Aucun livre ou document publié pour le moment.</p>';
      return;
    }

    const bySection = {};
    data.forEach(book => {
      const slug = BIB_SECTIONS.some(s => s.slug === book.bib_section) ? book.bib_section : "autres";
      (bySection[slug] = bySection[slug] || []).push(book);
    });

    listEl.innerHTML = BIB_SECTIONS
      .filter(s => bySection[s.slug] && bySection[s.slug].length > 0)
      .map(s => `
        <div class="bib-section">
          <p class="bib-section-title">${esc(s.label)}</p>
          ${bySection[s.slug].map(book => `
            <div class="book-item" data-id="${esc(book.id)}">
              <div class="book-row">
                <div class="book-main">
                  ${book.cover_image
                    ? `<img class="book-cover" src="${esc(book.cover_image)}" alt="" loading="lazy">`
                    : `<div class="book-cover-placeholder"><i class="ti ti-book-2"></i></div>`}
                  <div>
                    <div class="book-title">${esc(book.title)}</div>
                    ${book.excerpt ? `<div class="book-excerpt">${esc(book.excerpt)}</div>` : ""}
                    <div class="book-date">${formatDate(book.created_at)}</div>
                  </div>
                </div>
                <button class="btn-view" data-path="${esc(book.file_path || "")}" data-id="${esc(book.id)}">Consulter</button>
              </div>
              <div class="book-viewer" id="viewer-${esc(book.id)}" style="display:none;"></div>
            </div>
          `).join("")}
        </div>
      `).join("");

    listEl.querySelectorAll(".btn-view").forEach(btn => {
      btn.addEventListener("click", () => toggleViewer(btn));
    });
  }

  async function toggleViewer(btn) {
    const path = btn.dataset.path;
    const viewer = document.getElementById("viewer-" + btn.dataset.id);
    if (!path) { alert("Aucun fichier associé à ce contenu."); return; }

    const isOpen = viewer.style.display !== "none";
    if (isOpen) {
      viewer.style.display = "none";
      viewer.innerHTML = "";
      btn.textContent = "Consulter";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Préparation…";
    const { data, error } = await supabaseClient.storage
      .from(DOCUMENTS_BUCKET)
      .createSignedUrl(path, 120);
    btn.disabled = false;

    if (error || !data) {
      btn.textContent = "Consulter";
      alert("Impossible d'afficher ce contenu.");
      return;
    }

    viewer.innerHTML = `
      <iframe src="${data.signedUrl}#toolbar=0&navpanes=0" title="Document"></iframe>
      <p class="book-viewer-note">Aperçu en lecture seule</p>
    `;
    viewer.style.display = "";
    btn.textContent = "Fermer";
  }

  (async () => {
    const result = await requireActiveMember("connexion.html");
    if (!result) return;
    document.getElementById("signoutBtn").style.display = "";
    document.getElementById("loadingMsg").style.display = "none";
    renderCardStatusBanner(result.state);
    loadBooks(result.state === "blocked");
  })();

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut();
    window.location.href = "connexion.html";
  });
</script>

</body>
</html>
