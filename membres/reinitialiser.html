<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script>(function(){try{var t=localStorage.getItem('amstc-theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<script src="../assets/js/theme-toggle.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveau mot de passe - Espace Membres - AMSTC</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/reinitialiser.html">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="../assets/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="../assets/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="../assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --shadow:0 12px 32px rgba(6,68,28,0.10); --radius:14px;
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:520px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line);}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  .logo-img{height:42px;}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-accent); display:inline-block; margin:40px 0 18px;}
  .eyebrow{font-family:var(--mono); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-accent); display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .eyebrow::before{content:""; width:22px; height:1px; background:var(--gold-deep);}
  h1{font-family:var(--display); font-weight:600; color:var(--text-heading); font-size:clamp(1.7rem,4vw,2.2rem); margin-bottom:14px;}
  .intro{color:var(--text-muted); font-size:1rem; margin-bottom:32px;}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:28px 30px; margin-bottom:22px;}
  label{display:block; font-size:0.85rem; font-weight:600; color:var(--text-heading); margin-top:16px;}
  label:first-child{margin-top:0;}
  input{
    width:100%; padding:12px 14px; margin-top:6px; border:1.5px solid var(--line); border-radius:10px;
    font-family:var(--body); font-size:0.95rem; color:var(--ink); background:var(--paper);
  }
  input:focus{outline:2px solid var(--green); outline-offset:1px; border-color:var(--green);}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; font-size:0.95rem;
    padding:13px 24px; border-radius:999px; border:none; cursor:pointer; width:100%; margin-top:24px;
    background:var(--gold); color:var(--text-heading); transition:background .18s ease;
  }
  .btn:hover{background:var(--gold-deep); color:var(--white);}
  .btn:disabled{opacity:0.6; cursor:not-allowed;}
  .form-message{margin-top:18px; padding:12px 14px; border-radius:10px; font-size:0.9rem; display:none;}
  .form-message.error{background:#FDEEEE; color:#B23B3B; display:block;}
  .form-message.success{background:var(--paper-alt); color:var(--text-heading); display:block;}
  footer{padding:40px 0; text-align:center;}
  footer a{color:var(--green); font-family:var(--mono); font-size:0.85rem;}
</style>
</head>
<body>

<header>
  <div class="header-wrap">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
  </div>
</header>

<div class="wrap">
  <p class="eyebrow">Espace Membres</p>
  <h1>Choisir un nouveau mot de passe</h1>
  <p class="intro" id="introText">Vérification du lien en cours…</p>

  <div class="card" id="resetCard" style="display:none;">
    <form id="resetForm">
      <label for="password">Nouveau mot de passe</label>
      <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">

      <label for="passwordConfirm">Confirmer le mot de passe</label>
      <input type="password" id="passwordConfirm" name="passwordConfirm" required minlength="8" autocomplete="new-password">

      <button type="submit" class="btn" id="submitBtn">Enregistrer</button>
      <div class="form-message" id="formMessage"></div>
    </form>
  </div>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  const introText = document.getElementById("introText");
  const resetCard = document.getElementById("resetCard");
  const form = document.getElementById("resetForm");
  const submitBtn = document.getElementById("submitBtn");
  const messageEl = document.getElementById("formMessage");

  // Le lien reçu par e-mail ouvre une session temporaire de type "recovery".
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === "PASSWORD_RECOVERY" && session) {
      introText.textContent = "Choisissez votre nouveau mot de passe.";
      resetCard.style.display = "";
    }
  });

  // Filet de sécurité : si l'événement a déjà eu lieu avant que ce script
  // ne s'exécute, on vérifie directement s'il existe une session active.
  (async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      introText.textContent = "Choisissez votre nouveau mot de passe.";
      resetCard.style.display = "";
    } else {
      setTimeout(async () => {
        const { data: { session: retrySession } } = await supabaseClient.auth.getSession();
        if (!retrySession) {
          introText.textContent = "Ce lien de réinitialisation est invalide ou a expiré. Demandez-en un nouveau depuis la page de connexion.";
        }
      }, 1500);
    }
  })();

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    messageEl.className = "form-message";

    const password = document.getElementById("password").value;
    const passwordConfirm = document.getElementById("passwordConfirm").value;

    if (password !== passwordConfirm) {
      messageEl.textContent = "Les deux mots de passe ne correspondent pas.";
      messageEl.className = "form-message error";
      return;
    }

    submitBtn.disabled = true;
    const { error } = await supabaseClient.auth.updateUser({ password });

    if (error) {
      messageEl.textContent = error.message || "Une erreur est survenue. Réessayez.";
      messageEl.className = "form-message error";
      submitBtn.disabled = false;
      return;
    }

    messageEl.textContent = "Mot de passe mis à jour. Redirection vers la connexion…";
    messageEl.className = "form-message success";
    await supabaseClient.auth.signOut();
    setTimeout(() => { window.location.href = "connexion.html"; }, 1800);
  });
</script>

</body>
</html>
