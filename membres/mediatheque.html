<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --radius:14px;
    --display:'Sora',sans-serif; --body:'Inter',-apple-system,sans-serif; --mono:'JetBrains Mono',monospace;
    --rose-light:#FCE8EF; --rose:#D6538A; --rose-dark:#A83A67; --rose-deeper:#7A2A4A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.6;}
  a{color:inherit;text-decoration:none;}

  header{background:var(--green-deep);}
  .header-inner{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
  .logo-img{height:38px;filter:brightness(0) invert(1);}
  .signout-btn{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.7);background:none;border:1px solid rgba(255,255,255,0.25);border-radius:999px;padding:7px 16px;cursor:pointer;}
  .signout-btn:hover{border-color:rgba(255,255,255,0.6);}

  .member-tabs{background:var(--green-deep);border-top:1px solid rgba(255,255,255,0.08);}
  .member-tabs-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;justify-content:safe center;gap:2px;overflow-x:auto;}
  .member-tab{font-family:var(--mono);font-size:0.7rem;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);padding:14px 14px;border-bottom:2px solid transparent;white-space:nowrap;transition:color .18s;flex-shrink:0;}
  .member-tab:hover{color:rgba(255,255,255,0.8);}
  .member-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

  .hero{background:var(--green-deep);padding:32px 0 40px;}
  .hero-inner{max-width:1180px;margin:0 auto;padding:0 24px;}
  .back{font-family:var(--mono);font-size:0.72rem;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.5);display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;}
  .back:hover{color:var(--gold);}
  .hero-icon{width:52px;height:52px;border-radius:12px;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--rose-dark);margin-bottom:14px;}
  .hero h1{font-family:var(--display);font-size:clamp(1.6rem,4vw,2rem);font-weight:600;color:var(--white);margin-bottom:6px;}
  .hero-sub{color:rgba(255,255,255,0.6);font-size:0.95rem;}

  .wrap{max-width:1180px;margin:0 auto;padding:0 24px;}

  .year-section{padding:28px 0 8px;}
  .year-title{font-family:var(--display);font-size:1.3rem;font-weight:700;color:var(--text-heading);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
  .year-title::after{content:"";flex:1;height:1px;background:var(--line);}

  .folders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;padding-bottom:20px;}
  .folder-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;transition:box-shadow .18s,transform .18s;}
  .folder-card:hover{box-shadow:0 8px 24px rgba(6,68,28,0.1);transform:translateY(-3px);}
  .folder-cover{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--rose-light);display:block;}
  .folder-cover-placeholder{width:100%;aspect-ratio:4/3;background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--rose-dark);}
  .folder-body{padding:14px 16px;}
  .folder-title{font-family:var(--display);font-size:0.97rem;font-weight:600;color:var(--text-heading);margin-bottom:4px;}
  .folder-meta{font-family:var(--mono);font-size:0.72rem;color:#8A9E8F;}

  .empty{color:var(--text-muted);font-family:var(--mono);font-size:0.85rem;padding:60px 0;text-align:center;}

  footer{padding:40px 0;text-align:center;}
  footer a{color:var(--green);font-family:var(--mono);font-size:0.82rem;}
</style>

<div class="hero">
  <div class="hero-inner">
    <a class="back" href="index.html"><i class="ti ti-arrow-left"></i> Espace membres</a>

    <p class="hero-sub">Photos des activités de l'association, classées par année</p>

<div class="wrap">
  <p class="empty" id="loadingMsg">Chargement…</p>
  <div id="pageContent" style="display:none;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  const MEDIA_BUCKET = "mediatheque-photos";
  function esc(s){ return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  async function loadFolders() {
    const content = document.getElementById("pageContent");

    const { data: folders, error } = await supabaseClient
      .from("media_folders")
      .select("id, year, title, cover_path")
      .eq("is_published", true)
      .is("parent_id", null)
      .order("year", { ascending: false })
      .order("created_at", { ascending: false });

    if (error || !folders || folders.length === 0) {
      document.getElementById("loadingMsg").style.display = "none";
      content.style.display = "";
      content.innerHTML = '<p class="empty">Aucun album publié pour le moment.</p>';
      return;
    }

    const { data: counts } = await supabaseClient
      .from("media_photos")
      .select("folder_id");
    const countByFolder = {};
    (counts || []).forEach(p => { countByFolder[p.folder_id] = (countByFolder[p.folder_id] || 0) + 1; });

    const coverPaths = folders.filter(f => f.cover_path).map(f => f.cover_path);
    let signedByPath = {};
    if (coverPaths.length > 0) {
      const { data: signed } = await supabaseClient.storage.from(MEDIA_BUCKET).createSignedUrls(coverPaths, 3600);
      (signed || []).forEach(s => { if (s.signedUrl) signedByPath[s.path] = s.signedUrl; });
    }

    const byYear = {};
    folders.forEach(f => { (byYear[f.year] = byYear[f.year] || []).push(f); });
    const years = Object.keys(byYear).sort((a, b) => b - a);

    content.innerHTML = years.map(year => `
      <div class="year-section">
        <p class="year-title">${year}</p>
        <div class="folders-grid">
          ${byYear[year].map(f => {
            const cover = f.cover_path && signedByPath[f.cover_path];
            const count = countByFolder[f.id] || 0;
            return `
              <a class="folder-card" href="mediatheque-dossier.html?id=${encodeURIComponent(f.id)}">
                ${cover
                  ? `<img class="folder-cover" src="${cover}" alt="" loading="lazy">`
                  : `<div class="folder-cover-placeholder"><i class="ti ti-photo"></i></div>`}
                <div class="folder-body">
                  <p class="folder-title">${esc(f.title)}</p>
                  <p class="folder-meta">${count} photo${count > 1 ? 's' : ''}</p>
                </div>
              </a>`;
          }).join('')}
        </div>
      </div>
    `).join('');

    document.getElementById("loadingMsg").style.display = "none";
    content.style.display = "";
  }

  (async () => {
    const profile = await requireApprovedMember("connexion.html");
    if (!profile) return;
    document.getElementById("signoutBtn").style.display = "";
    await loadFolders();
  })();

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut();
    window.location.href = "connexion.html";
  });
</script>
