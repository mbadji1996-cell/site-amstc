<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Documents officiels - Espace Membres - AMSTC</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/documents.html">
<link rel="icon" href="../assets/logo-horizontal-sm.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --shadow:0 12px 32px rgba(6,68,28,0.10); --radius:14px;
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:820px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line);}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px; display:flex; align-items:center; justify-content:space-between;}
  .logo-img{height:42px;}
  .signout-btn{
    font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--gold-deep); background:none; border:1.5px solid var(--line); border-radius:999px;
    padding:9px 18px; cursor:pointer; transition:border-color .18s ease;
  }
  .signout-btn:hover{border-color:var(--gold-deep);}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold-deep); display:inline-block; margin:36px 0 8px;}
  .eyebrow{font-family:var(--mono); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-deep); display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .eyebrow::before{content:""; width:22px; height:1px; background:var(--gold-deep);}
  h1{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:clamp(1.7rem,4vw,2.2rem); margin-bottom:14px;}
  .intro{color:#3C4E44; font-size:1.02rem; margin-bottom:32px;}
  .doc-row{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:20px 24px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:14px; flex-wrap:wrap;
  }
  .doc-title{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:1.05rem;}
  .doc-excerpt{color:#465A4E; font-size:0.92rem; margin-top:4px;}
  .doc-date{font-family:var(--mono); font-size:0.75rem; color:#5A6C60; margin-top:6px;}
  .btn-download{
    font-weight:600; font-size:0.85rem; padding:10px 20px; border-radius:999px; border:none; cursor:pointer;
    background:var(--gold); color:var(--green-deep); flex-shrink:0; transition:opacity .15s ease;
  }
  .btn-download:hover{opacity:0.88;}
  .btn-download:disabled{opacity:0.6; cursor:wait;}
  .empty, .error, .loading{color:#5A6C60; font-family:var(--mono); font-size:0.85rem; padding:20px 0;}
  footer{padding:40px 0; text-align:center;}
  footer a{color:var(--green); font-family:var(--mono); font-size:0.85rem;}
</style>
</head>
<body>

<header>
  <div class="header-wrap">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
    <button class="signout-btn" id="signoutBtn" style="display:none;">Se déconnecter</button>
  </div>
</header>

<div class="wrap">
  <a class="back" href="index.html">← Espace membres</a>
  <p class="eyebrow">Espace Membres</p>
  <h1>Documents officiels</h1>
  <p class="intro">Statuts, Règlement intérieur, rapports et autres documents réservés aux membres approuvés de l'association.</p>
  <noscript><p class="error">L'affichage nécessite JavaScript. Veuillez l'activer, ou nous écrire à contact@amstc.org.</p></noscript>
  <div id="list">
    <p class="loading" id="loadingMsg">Vérification de votre accès…</p>
  </div>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  const DOCUMENTS_BUCKET = "documents-reserves";
  function esc(s){ return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function formatDate(d){
    return d ? new Date(d).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" }) : "";
  }

  async function loadDocuments() {
    const listEl = document.getElementById("list");
    const { data, error } = await supabaseClient
      .from("restricted_articles")
      .select("id,title,excerpt,file_path,created_at")
      .eq("category", "document")
      .order("created_at", { ascending: false });

    if (error) {
      listEl.innerHTML = '<p class="error">Impossible de charger les documents pour le moment.</p>';
      return;
    }

    if (!data || data.length === 0) {
      listEl.innerHTML = '<p class="empty">Aucun document publié pour le moment.</p>';
      return;
    }

    listEl.innerHTML = data.map(doc => `
      <div class="doc-row">
        <div>
          <div class="doc-title">${esc(doc.title)}</div>
          ${doc.excerpt ? `<div class="doc-excerpt">${esc(doc.excerpt)}</div>` : ""}
          <div class="doc-date">${formatDate(doc.created_at)}</div>
        </div>
        <button class="btn-download" data-path="${esc(doc.file_path || "")}">Télécharger</button>
      </div>
    `).join("");

    listEl.querySelectorAll(".btn-download").forEach(btn => {
      btn.addEventListener("click", () => handleDownload(btn));
    });
  }

  async function handleDownload(btn) {
    const path = btn.dataset.path;
    if (!path) { alert("Aucun fichier associé à ce document."); return; }
    btn.disabled = true;
    btn.textContent = "Préparation…";
    const { data, error } = await supabaseClient.storage
      .from(DOCUMENTS_BUCKET)
      .createSignedUrl(path, 60);
    btn.disabled = false;
    btn.textContent = "Télécharger";
    if (error || !data) {
      alert("Impossible de générer le lien de téléchargement.");
      return;
    }
    window.open(data.signedUrl, "_blank");
  }

  (async () => {
    const profile = await requireApprovedMember("connexion.html");
    if (!profile) return;
    document.getElementById("signoutBtn").style.display = "";
    document.getElementById("loadingMsg").style.display = "none";
    loadDocuments();
  })();

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut();
    window.location.href = "connexion.html";
  });
</script>

</body>
</html>
