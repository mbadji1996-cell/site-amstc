<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Validation des comptes - Espace Membres - AMSTC</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://amstc.org/membres/validation.html">
<link rel="icon" href="../assets/logo-horizontal-sm.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#FFFFFF; --line:rgba(6,68,28,0.14);
    --shadow:0 12px 32px rgba(6,68,28,0.10); --radius:14px;
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:820px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line);}
  .header-wrap{max-width:1180px; margin:0 auto; padding:0 28px; display:flex; align-items:center; justify-content:space-between;}
  .logo-img{height:42px;}
  .signout-btn{
    font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--gold-deep); background:none; border:1.5px solid var(--line); border-radius:999px;
    padding:9px 18px; cursor:pointer; transition:border-color .18s ease;
  }
  .signout-btn:hover{border-color:var(--gold-deep);}
  .eyebrow{font-family:var(--mono); font-size:0.72rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold-deep); display:flex; align-items:center; gap:10px; margin:40px 0 14px;}
  .eyebrow::before{content:""; width:22px; height:1px; background:var(--gold-deep);}
  h1{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:clamp(1.7rem,4vw,2.2rem); margin-bottom:14px;}
  .intro{color:#3C4E44; font-size:1.02rem; margin-bottom:32px;}
  h2{font-family:var(--display); font-size:1.1rem; color:var(--green-deep); margin:36px 0 16px;}
  .member-row{
    background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:18px 22px;
    display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:12px; flex-wrap:wrap;
  }
  .member-name{font-family:var(--display); font-weight:600; color:var(--green-deep); font-size:1rem;}
  .member-email{font-size:0.88rem; color:#5A6C60; margin-top:2px;}
  .member-date{font-family:var(--mono); font-size:0.75rem; color:#5A6C60; margin-top:4px;}
  .member-actions{display:flex; gap:10px; flex-shrink:0;}
  .btn-sm{
    font-weight:600; font-size:0.85rem; padding:9px 18px; border-radius:999px; border:none; cursor:pointer;
    transition:opacity .15s ease;
  }
  .btn-sm:hover{opacity:0.85;}
  .btn-approve{background:var(--green); color:var(--white);}
  .btn-reject{background:#FDEEEE; color:#B23B3B;}
  .status-tag{font-family:var(--mono); font-size:0.7rem; text-transform:uppercase; padding:4px 10px; border-radius:999px;}
  .status-tag.approved{background:var(--paper-alt); color:var(--green-deep);}
  .status-tag.rejected{background:#FDEEEE; color:#B23B3B;}
  .empty, .loading{color:#5A6C60; font-family:var(--mono); font-size:0.85rem; padding:20px 0;}
  footer{padding:40px 0; text-align:center;}
  footer a{color:var(--green); font-family:var(--mono); font-size:0.85rem;}
</style>
</head>
<body>

<header>
  <div class="header-wrap">
    <a href="../index.html"><img src="../assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
    <button class="signout-btn" id="signoutBtn" style="display:none;">Se déconnecter</button>
  </div>
</header>

<div class="wrap" id="pageContent" style="display:none;">
  <p class="eyebrow">Espace Membres — Administration</p>
  <h1>Validation des comptes</h1>
  <p class="intro">Approuvez ou refusez les demandes d'inscription à l'espace membres.</p>

  <h2>En attente</h2>
  <div id="pendingList"><p class="loading">Chargement…</p></div>

  <h2>Traités récemment</h2>
  <div id="processedList"></div>
</div>

<div class="wrap">
  <p class="loading" id="loadingMsg">Vérification de vos droits…</p>
</div>

<footer>
  <a href="../index.html">AMSTC - Association Médico-Sociale des Talibés Cheikh</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/supabase-client.js"></script>
<script>
  function esc(s){ return (s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  function formatDate(d){
    return d ? new Date(d).toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" }) : "";
  }

  async function loadLists() {
    const pendingEl = document.getElementById("pendingList");
    const processedEl = document.getElementById("processedList");

    const { data, error } = await supabaseClient
      .from("profiles")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      pendingEl.innerHTML = '<p class="empty">Impossible de charger les comptes.</p>';
      return;
    }

    const pending = data.filter(p => p.status === "pending");
    const processed = data.filter(p => p.status !== "pending").slice(0, 20);

    pendingEl.innerHTML = pending.length === 0
      ? '<p class="empty">Aucune demande en attente.</p>'
      : pending.map(p => `
        <div class="member-row" data-id="${esc(p.id)}">
          <div>
            <div class="member-name">${esc(p.full_name || "(nom non renseigné)")}</div>
            <div class="member-email">${esc(p.email)}</div>
            <div class="member-date">Inscrit le ${formatDate(p.created_at)}</div>
          </div>
          <div class="member-actions">
            <button class="btn-sm btn-approve" data-action="approve" data-id="${esc(p.id)}">Approuver</button>
            <button class="btn-sm btn-reject" data-action="reject" data-id="${esc(p.id)}">Refuser</button>
          </div>
        </div>
      `).join("");

    processedEl.innerHTML = processed.length === 0
      ? '<p class="empty">Aucun compte traité pour le moment.</p>'
      : processed.map(p => `
        <div class="member-row">
          <div>
            <div class="member-name">${esc(p.full_name || "(nom non renseigné)")}</div>
            <div class="member-email">${esc(p.email)}</div>
          </div>
          <span class="status-tag ${esc(p.status)}">${p.status === "approved" ? "Approuvé" : "Refusé"}</span>
        </div>
      `).join("");

    pendingEl.querySelectorAll("button[data-action]").forEach(btn => {
      btn.addEventListener("click", () => handleAction(btn.dataset.id, btn.dataset.action));
    });
  }

  async function handleAction(id, action) {
    const newStatus = action === "approve" ? "approved" : "rejected";
    const { error } = await supabaseClient
      .from("profiles")
      .update({ status: newStatus })
      .eq("id", id);
    if (error) {
      alert("Une erreur est survenue : " + error.message);
      return;
    }
    loadLists();
  }

  (async () => {
    const profile = await requireAdmin("connexion.html");
    if (!profile) return;

    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("pageContent").style.display = "";
    document.getElementById("signoutBtn").style.display = "";
    loadLists();
  })();

  document.getElementById("signoutBtn").addEventListener("click", async () => {
    await signOut();
    window.location.href = "connexion.html";
  });
</script>

</body>
</html>
