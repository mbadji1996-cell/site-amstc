<!DOCTYPE html>
<html lang="fr">
<head>

<script src="assets/js/site-search.js" defer></script>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#06441C">
<script src="assets/js/pwa-register.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="canonical" href="https://amstc.org/agenda.html">
<meta name="description" content="L'agenda de l'AMSTC - toutes les réalisations, formations et projets réunis dans une seule frise chronologique.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="AMSTC">
<meta property="og:title" content="Agenda - AMSTC">
<meta property="og:description" content="L'agenda de l'AMSTC - toutes les réalisations, formations et projets réunis dans une seule frise chronologique.">
<meta property="og:url" content="https://amstc.org/agenda.html">
<meta property="og:image" content="https://amstc.org/assets/og-image.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/favicon-32.png" sizes="32x32">
<link rel="icon" type="image/png" href="assets/favicon-192.png" sizes="192x192">
<link rel="apple-touch-icon" href="assets/favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2E17; --green:#17763B; --green-deep:#06441C; --gold:#F8B718; --gold-deep:#AA7B11;
    --paper:#F6F7F1; --paper-alt:#ECEFE3; --white:#fff; --line:rgba(6,68,28,0.14);
    --display:'Sora', sans-serif; --body:'Inter', -apple-system, sans-serif; --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--body); color:var(--ink); background:var(--paper); line-height:1.6;}
  a{color:inherit; text-decoration:none;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  header{padding:24px 0; border-bottom:1px solid var(--line); background:var(--green-deep);}
  .logo-img{height:42px;filter:brightness(0) invert(1);}
  .back{font-family:var(--mono); font-size:0.78rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-accent); display:inline-block; margin:36px 0 8px;}
  h1{font-family:var(--display); font-weight:600; color:var(--text-heading); font-size:2.1rem; margin-bottom:12px;}
  .page-sub{color:var(--text-muted); font-size:0.98rem; margin-bottom:28px; max-width:640px;}

  .filter-bar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:36px;}
  .filter-pill{
    font-family:var(--mono); font-size:0.78rem; font-weight:600; padding:9px 18px; border-radius:999px;
    border:1.5px solid var(--line); background:var(--surface); color:var(--text-muted); cursor:pointer;
    transition:border-color .15s, color .15s, background .15s;
  }
  .filter-pill:hover{border-color:var(--green);}
  .filter-pill.active{background:var(--green-deep); border-color:var(--green-deep); color:var(--white);}

  .year-heading{
    font-family:var(--display); font-weight:700; font-size:1.4rem; color:var(--text-heading);
    margin:36px 0 20px; padding-bottom:10px; border-bottom:2px solid var(--line);
  }
  .year-heading:first-of-type{margin-top:0;}

  .grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-bottom:8px;}
  @media (max-width:880px){ .grid{grid-template-columns:1fr;} }
  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:transform .2s ease, box-shadow .2s ease; position:relative;}
  .card:hover{transform:translateY(-4px); box-shadow:0 12px 32px rgba(6,68,28,0.10);}
  .card img{width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:var(--paper-alt);}
  .card-body{padding:20px 22px;}
  .card-date{font-family:var(--mono); font-size:0.72rem; color:var(--text-accent); text-transform:uppercase; letter-spacing:0.06em;}
  .card h3{font-family:var(--display); font-size:1.15rem; color:var(--text-heading); margin:8px 0 8px;}
  .card p{font-size:0.92rem; color:var(--text-muted);}

  .type-badge{
    position:absolute; top:14px; left:14px; font-family:var(--mono); font-size:0.66rem; text-transform:uppercase;
    letter-spacing:0.05em; padding:4px 10px; border-radius:999px; z-index:1;
  }
  .type-badge.type-actualites{background:var(--gold); color:var(--green-deep);}
  .type-badge.type-formations{background:var(--green); color:var(--white);}
  .type-badge.type-projets{background:var(--surface); color:var(--text-heading); border:1px solid var(--line);}

  .status-badge{
    position:absolute; top:14px; right:14px; font-family:var(--mono); font-size:0.68rem; text-transform:uppercase;
    letter-spacing:0.05em; padding:5px 11px; border-radius:999px; background:var(--surface); color:var(--text-heading);
    box-shadow:0 2px 8px rgba(6,68,28,0.15); z-index:1;
  }
  .status-badge.statut-en-cours{background:var(--gold); color:var(--green-deep);}
  .status-badge.statut-termine{background:var(--green); color:var(--white);}
  .status-badge.statut-a-venir{background:var(--surface); color:var(--text-heading); border:1px solid var(--line);}

  .empty, .error{color:var(--text-muted); font-family:var(--mono); font-size:0.85rem; padding:20px 0;}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <a href="index.html"><img src="assets/logo-mark-sm.png" alt="AMSTC" class="logo-img"></a>
  </div>
</header>
<div class="wrap">
  <a class="back" href="index.html">← Retour à l'accueil</a>
  <h1>Agenda</h1>
  <p class="page-sub">Toutes nos réalisations, formations et projets réunis dans une seule frise chronologique.</p>

  <div class="filter-bar" id="filterBar">
    <button class="filter-pill active" data-type="tout">Tout</button>
    <button class="filter-pill" data-type="actualites">Réalisations</button>
    <button class="filter-pill" data-type="formations">Formations</button>
    <button class="filter-pill" data-type="projets">Projets</button>
  </div>

  <noscript><p class="error">L'affichage de l'agenda nécessite JavaScript. Veuillez l'activer dans votre navigateur, ou nous écrire à contact@amstc.org.</p></noscript>
  <div id="timeline">
    <p class="empty">Chargement de l'agenda…</p>
  </div>
</div>

<script>
  const SOURCES = [
    { type: 'actualites', label: 'Réalisation', page: 'article.html', file: 'content/actualites-index.json' },
    { type: 'formations', label: 'Formation', page: 'formation.html', file: 'content/formations-index.json' },
    { type: 'projets', label: 'Projet', page: 'projet.html', file: 'content/projets-index.json' },
  ];

  let allItems = [];
  let currentFilter = 'tout';

  function slugifyStatut(s) {
    return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderCard(item) {
    const source = SOURCES.find(s => s.type === item.__type);
    return `
      <a class="card" href="${source.page}?slug=${encodeURIComponent(item.slug)}">
        <span class="type-badge type-${item.__type}">${source.label}</span>
        ${item.statut ? `<span class="status-badge statut-${slugifyStatut(item.statut)}">${esc(item.statut)}</span>` : ""}
        ${item.image ? `<img src="${item.image}" alt="">` : ""}
        <div class="card-body">
          <span class="card-date">${item.date ? new Date(item.date).toLocaleDateString('fr-FR', {day:'numeric', month:'long', year:'numeric'}) : ''}</span>
          <h3>${esc(item.title || 'Sans titre')}</h3>
          <p>${esc(item.excerpt || '')}</p>
        </div>
      </a>
    `;
  }

  function render() {
    const timeline = document.getElementById('timeline');
    const filtered = currentFilter === 'tout' ? allItems : allItems.filter(it => it.__type === currentFilter);

    if (filtered.length === 0) {
      timeline.innerHTML = '<p class="empty">Rien à afficher pour ce filtre.</p>';
      return;
    }

    let html = '';
    let currentYear = null;
    let yearItems = [];

    function flushYear() {
      if (!yearItems.length) return;
      html += `<h2 class="year-heading">${currentYear}</h2><div class="grid">${yearItems.map(renderCard).join('')}</div>`;
      yearItems = [];
    }

    filtered.forEach(item => {
      const year = item.date ? new Date(item.date).getFullYear() : 'Sans date';
      if (year !== currentYear) {
        flushYear();
        currentYear = year;
      }
      yearItems.push(item);
    });
    flushYear();

    timeline.innerHTML = html;
  }

  document.getElementById('filterBar').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-pill');
    if (!btn) return;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.type;
    render();
  });

  async function loadAgenda() {
    const timeline = document.getElementById('timeline');
    try {
      const results = await Promise.all(SOURCES.map(s =>
        fetch(s.file).then(r => r.ok ? r.json() : []).catch(() => [])
      ));
      allItems = results.flatMap((items, i) =>
        items.map(it => ({ ...it, __type: SOURCES[i].type }))
      ).sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

      if (allItems.length === 0) {
        timeline.innerHTML = '<p class="empty">Aucun contenu publié pour le moment.</p>';
        return;
      }
      render();
    } catch (e) {
      timeline.innerHTML = '<p class="error">Impossible de charger l\'agenda pour le moment.</p>';
    }
  }
  loadAgenda();
</script>
</body>
</html>
