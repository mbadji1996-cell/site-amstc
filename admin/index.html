<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var t=localStorage.getItem('amstc-theme');if(!t){t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <script src="../assets/js/theme-toggle.js" defer></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration - AMSTC</title>
  <link rel="icon" href="../assets/logo-horizontal-sm.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{ font-family:'Inter', sans-serif; }
    #nc-root:empty::before{
      content:"Chargement de l'administration…";
      display:block;
      padding:40px;
      font-family:'Inter', sans-serif;
      color:#465A4E;
    }
  </style>
  <script>window.CMS_MANUAL_INIT = true;</script>
</head>
<body>
  <!-- Version épinglée volontairement (pas de "^") : decap-cms@3.15.0, publiée le
       23/07/2026, provoque un plantage (React error #130) à l'enregistrement de
       plusieurs fiches (Témoignages, Heures de prière). 3.14.1 est la dernière
       version stable confirmée avant cette régression - ne pas repasser à une
       plage flottante sans re-tester d'abord une publication réelle. -->
  <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewStyle('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap');
    CMS.registerPreviewStyle('/admin/preview.css');
    CMS.init();
  </script>
</body>
</html>
