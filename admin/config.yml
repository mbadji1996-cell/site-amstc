backend:
  name: github
  repo: mbadji1996-cell/site-amstc
  branch: main
  base_url: https://decap-proxy.mbadji1996.workers.dev
  auth_endpoint: auth

site_url: https://amstc.org
display_url: https://amstc.org
logo_url: /assets/logo-horizontal-sm.png

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: simple
locale: 'fr'

collections:

  - name: "accueil"
    label: "Page d'accueil"
    files:

      - name: "hero"
        label: "1. En-tête (hero)"
        file: "content/home-hero.json"
        fields:
          - { label: "Accroche (eyebrow)", name: "eyebrow", widget: "markdown", minimal: true, buttons: ["bold", "italic"] }
          - { label: "Titre principal", name: "hero_title", widget: "markdown", minimal: true, buttons: ["bold", "italic"] }
          - { label: "Sous-titre", name: "hero_subtitle", widget: "markdown" }

          - label: "Photos du diaporama (fond du hero)"
            name: "hero_slideshow"
            widget: "list"
            hint: "Photos affichées en fondu enchaîné en arrière-plan du hero. Format paysage recommandé."
            field: { label: "Photo", name: "image", widget: "image" }

          - label: "Les 3 cartes d'introduction"
            name: "intro_cards"
            widget: "list"
            fields:
              - { label: "Numéro / catégorie", name: "num", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "markdown" }
              - { label: "Texte du lien", name: "link_text", widget: "string" }
              - { label: "Lien (URL ou #ancre)", name: "link_href", widget: "string" }

          - { label: "Accroche de la section mission", name: "mission_eyebrow", widget: "string" }
          - { label: "Titre de la section mission", name: "mission_title", widget: "string" }
          - { label: "Mission - paragraphe 1", name: "mission_p1", widget: "markdown" }
          - { label: "Mission - paragraphe 2", name: "mission_p2", widget: "markdown" }
          - { label: "Titre du bloc emblème", name: "emblem_title", widget: "string" }

          - label: "Symbolique de l'emblème (4 points)"
            name: "emblem_items"
            widget: "list"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "markdown" }

      - name: "actions"
        label: "2. Nos actions"
        file: "content/home-actions.json"
        fields:
          - { label: "Accroche", name: "actions_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "actions_title", widget: "string" }
          - { label: "Sous-titre", name: "actions_subtitle", widget: "text" }

          - label: "Liste des actions (registre)"
            name: "actions"
            widget: "list"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "text", widget: "markdown" }
              - { label: "Étiquette (ex: Médical, Formation...)", name: "tag", widget: "string" }
              - { label: "Lien (URL ou #ancre)", name: "href", widget: "string" }

      - name: "historique"
        label: "3. Notre histoire"
        file: "content/home-historique.json"
        fields:
          - { label: "Accroche", name: "history_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "history_title", widget: "string" }
          - { label: "Sous-titre", name: "history_subtitle", widget: "text" }

          - label: "Frise chronologique"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Année(s)", name: "year", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "markdown" }

      - name: "gouvernance"
        label: "4. Organisation"
        file: "content/home-gouvernance.json"
        fields:
          - { label: "Accroche", name: "gov_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "gov_title", widget: "string" }
          - { label: "Sous-titre", name: "gov_subtitle", widget: "text" }

          - label: "Membres du Bureau Exécutif"
            name: "members"
            widget: "list"
            hint: "Un membre par fiche. L'ordre ici définit l'ordre d'affichage sur le site."
            fields:
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Nom", name: "name", widget: "string" }
              - { label: "Rôle (Président, Adjoint...)", name: "role", widget: "string" }
              - { label: "Commission / groupe", name: "commission", widget: "string" }
              - { label: "Précision (formation, spécialité...)", name: "detail", widget: "string", required: false }

      - name: "cta_footer"
        label: "5. Bandeau de don + Pied de page"
        file: "content/home-cta-footer.json"
        fields:
          - { label: "Titre du bandeau de don", name: "cta_title", widget: "string" }
          - { label: "Texte du bandeau de don", name: "cta_text", widget: "text" }
          - { label: "Description (pied de page)", name: "footer_description", widget: "text" }
          - { label: "Numéro de récépissé", name: "recepisse", widget: "string" }
          - { label: "Téléphone de contact", name: "contact_phone", widget: "string", required: false }
          - { label: "Lien Facebook", name: "lien_facebook", widget: "string", required: false }
          - { label: "Lien LinkedIn", name: "lien_linkedin", widget: "string", required: false }
          - { label: "Lien Instagram", name: "lien_instagram", widget: "string", required: false }

      - name: "don"
        label: "6. Faire un don"
        file: "content/don.json"
        fields:
          - { label: "Accroche", name: "eyebrow", widget: "string" }
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Texte d'introduction", name: "intro", widget: "text" }
          - { label: "Titre - Virement bancaire", name: "bank_title", widget: "string" }
          - { label: "Coordonnées bancaires", name: "bank_details", widget: "markdown", hint: "Titulaire, banque, IBAN/RIB, SWIFT..." }
          - { label: "Titre - Mobile Money", name: "mobile_title", widget: "string" }
          - label: "Options Mobile Money"
            name: "mobile_options"
            widget: "list"
            fields:
              - { label: "Opérateur (ex: Orange Money, Wave...)", name: "operator", widget: "string" }
              - { label: "Numéro", name: "number", widget: "string" }
              - { label: "Nom du titulaire", name: "name", widget: "string" }
          - { label: "Titre - Don en nature", name: "nature_title", widget: "string" }
          - { label: "Texte - Don en nature", name: "nature_text", widget: "text" }
          - { label: "Titre - Don institutionnel", name: "institution_title", widget: "string" }
          - { label: "Texte - Don institutionnel", name: "institution_text", widget: "text" }
          - { label: "Note de confiance (récépissé)", name: "trust_note", widget: "string" }

      - name: "sections_libres"
        label: "7. Sections personnalisées"
        file: "content/home-sections-libres.json"
        fields:
          - label: "Blocs (affichés entre 'Organisation' et 'Réalisations')"
            name: "sections"
            widget: "list"
            types:
              - label: "Texte + image"
                name: "texte_image"
                widget: "object"
                fields:
                  - { label: "Accroche", name: "eyebrow", widget: "string", required: false }
                  - { label: "Titre", name: "title", widget: "string", required: false }
                  - { label: "Texte", name: "text", widget: "markdown" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Position de l'image", name: "image_position", widget: "select", options: ["droite", "gauche"], default: "droite" }

              - label: "Bandeau / citation"
                name: "bandeau"
                widget: "object"
                fields:
                  - { label: "Titre", name: "title", widget: "string", required: false }
                  - { label: "Texte", name: "text", widget: "markdown" }
                  - { label: "Style", name: "style", widget: "select", options: ["vert", "or", "clair"], default: "vert" }
                  - { label: "Texte du bouton", name: "button_text", widget: "string", required: false }
                  - { label: "Lien du bouton", name: "button_href", widget: "string", required: false }

              - label: "Grille de cartes"
                name: "cartes"
                widget: "object"
                fields:
                  - { label: "Titre de la section", name: "title", widget: "string", required: false }
                  - label: "Cartes"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image", required: false }
                      - { label: "Titre", name: "title", widget: "string" }
                      - { label: "Texte", name: "text", widget: "markdown" }

              - label: "Galerie photos"
                name: "galerie"
                widget: "object"
                fields:
                  - { label: "Titre de la section", name: "title", widget: "string", required: false }
                  - label: "Images"
                    name: "images"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Légende", name: "caption", widget: "string", required: false }

      - name: "mediatheque"
        label: "8. Médiathèque"
        file: "content/mediatheque.json"
        fields:
          - { label: "Accroche", name: "media_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "media_title", widget: "string" }
          - { label: "Sous-titre", name: "media_subtitle", widget: "text" }
          - label: "Dossiers par année"
            name: "media_years"
            widget: "list"
            hint: "Un dossier par année. L'ordre ici définit l'ordre des onglets affichés sur le site."
            fields:
              - { label: "Année", name: "year", widget: "string" }
              - label: "Photos"
                name: "photos"
                widget: "list"
                field: { label: "Photo", name: "image", widget: "image" }

  - name: "actualites"
    label: "Réalisations"
    folder: "content/actualites"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Résumé (affiché dans la liste)", name: "excerpt", widget: "text" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Contenu de l'article", name: "body", widget: "markdown" }

  - name: "formations"
    label: "Formation"
    folder: "content/formations"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Résumé (affiché dans la liste)", name: "excerpt", widget: "text" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Contenu", name: "body", widget: "markdown" }
