backend:
  name: github
  repo: mbadji1996-cell/site-amstc
  branch: main
  base_url: https://decap-proxy.mbadji1996.workers.dev
  auth_endpoint: auth

site_url: https://amstc.org
display_url: https://amstc.org
logo_url: /assets/logo-horizontal-sm.png

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: editorial_workflow
locale: 'fr'

collections:

  - name: "accueil"
    label: "Page d'accueil"
    files:

      - name: "hero"
        label: "1. En-tête (hero)"
        file: "content/home-hero.json"
        fields:
          - { label: "Accroche (eyebrow)", name: "eyebrow", widget: "markdown", minimal: true, buttons: ["bold", "italic"] }
          - { label: "Titre principal", name: "hero_title", widget: "markdown", minimal: true, buttons: ["bold", "italic"] }
          - { label: "Sous-titre", name: "hero_subtitle", widget: "markdown" }

          - label: "Photos du diaporama (fond du hero)"
            name: "hero_slideshow"
            widget: "list"
            hint: "Photos affichées en fondu enchaîné en arrière-plan du hero. Format paysage recommandé. Laissez vide pour utiliser les photos par défaut."
            field: { label: "Photo", name: "image", widget: "image" }

          - label: "Les 3 cartes d'introduction"
            name: "intro_cards"
            widget: "list"
            fields:
              - { label: "Numéro / catégorie", name: "num", widget: "string", hint: "Ex: 01, 02, 03…" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "markdown" }
              - { label: "Texte du lien", name: "link_text", widget: "string" }
              - { label: "Lien (URL ou #ancre)", name: "link_href", widget: "string" }

          - { label: "Accroche de la section mission", name: "mission_eyebrow", widget: "string" }
          - { label: "Titre de la section mission", name: "mission_title", widget: "string" }
          - { label: "Mission - paragraphe 1", name: "mission_p1", widget: "markdown" }
          - { label: "Mission - paragraphe 2", name: "mission_p2", widget: "markdown" }
          - { label: "Titre du bloc emblème", name: "emblem_title", widget: "string" }

          - label: "Symbolique de l'emblème (4 points)"
            name: "emblem_items"
            widget: "list"
            fields:
              - { label: "Titre du point", name: "title", widget: "string" }
              - { label: "Texte explicatif", name: "text", widget: "markdown" }

      - name: "actions"
        label: "2. Nos actions"
        file: "content/home-actions.json"
        fields:
          - { label: "Accroche", name: "actions_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "actions_title", widget: "string" }
          - { label: "Sous-titre", name: "actions_subtitle", widget: "text" }

          - label: "Liste des actions (registre)"
            name: "actions"
            widget: "list"
            hint: "L'ordre ici définit l'ordre d'affichage sur le site."
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Description", name: "text", widget: "markdown" }
              - { label: "Étiquette (ex: Médical, Formation...)", name: "tag", widget: "string" }
              - { label: "Lien (URL ou #ancre)", name: "href", widget: "string" }

      - name: "historique"
        label: "3. Notre histoire"
        file: "content/home-historique.json"
        fields:
          - { label: "Accroche", name: "history_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "history_title", widget: "string" }
          - { label: "Sous-titre", name: "history_subtitle", widget: "text" }

          - label: "Frise chronologique"
            name: "timeline"
            widget: "list"
            hint: "L'ordre ici définit l'ordre d'affichage sur la frise."
            fields:
              - { label: "Année(s)", name: "year", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Texte", name: "text", widget: "markdown" }

          - { label: "Titre - Les Pionniers", name: "pioneers_title", widget: "string", default: "Les Pionniers" }
          - { label: "Sous-titre - Les Pionniers", name: "pioneers_subtitle", widget: "string", required: false }
          - label: "Disposition - Les Pionniers"
            name: "pioneers_layout"
            widget: "select"
            default: "cartes"
            hint: "Détermine si les pionniers s'affichent en cartes avec photo ou en simple liste de noms."
            options:
              - { label: "Cartes avec photo", value: "cartes" }
              - { label: "Liste de noms (sans photo)", value: "liste" }
          - label: "Les Pionniers (membres fondateurs)"
            name: "pioneers"
            widget: "list"
            hint: "L'ordre ici définit l'ordre d'affichage sur le site. Laissez la liste vide pour masquer ce bloc."
            summary: "{{fields.name}}"
            fields:
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Nom", name: "name", widget: "string", required: false }

          - { label: "Titre - Anciens présidents", name: "presidents_title", widget: "string", default: "Nos anciens présidents" }
          - { label: "Sous-titre - Anciens présidents", name: "presidents_subtitle", widget: "string", required: false }
          - label: "Liste des anciens présidents"
            name: "presidents"
            widget: "list"
            hint: "Laissez la liste vide pour masquer ce bloc sur le site."
            summary: "{{fields.name}}"
            fields:
              - { label: "Photo", name: "photo", widget: "image", required: false }
              - { label: "Nom", name: "name", widget: "string" }
              - { label: "Mandat (ex: 3e Président, 2018-2019)", name: "mandate", widget: "string" }

      - name: "gouvernance"
        label: "4. Organisation"
        file: "content/home-gouvernance.json"
        fields:
          - { label: "Accroche", name: "gov_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "gov_title", widget: "string" }
          - { label: "Sous-titre", name: "gov_subtitle", widget: "text" }

          - label: "Membres du Bureau Exécutif"
            name: "members"
            widget: "list"
            hint: "Un membre par fiche. L'ordre ici définit l'ordre d'affichage sur le site."
            summary: "{{fields.name}}"
            fields:
              - { label: "Photo", name: "photo", widget: "image" }
              - { label: "Nom", name: "name", widget: "string" }
              - { label: "Rôle (Président, Adjoint...)", name: "role", widget: "string" }
              - { label: "Commission / groupe", name: "commission", widget: "string", hint: "Ex: Commission Médicale, Commission Communication… (une des commissions statutaires de l'association)." }
              - { label: "Précision (formation, spécialité...)", name: "detail", widget: "string", required: false }

      - name: "sections_libres"
        label: "5. Sections personnalisées"
        file: "content/home-sections-libres.json"
        fields:
          - label: "Blocs (affichés entre 'Organisation' et 'Réalisations')"
            name: "sections"
            widget: "list"
            hint: "Ajoutez un bloc et choisissez son type (texte+image, bandeau, grille de cartes, galerie). L'ordre ici définit l'ordre d'affichage."
            types:
              - label: "Texte + image"
                name: "texte_image"
                widget: "object"
                fields:
                  - { label: "Accroche", name: "eyebrow", widget: "string", required: false }
                  - { label: "Titre", name: "title", widget: "string", required: false }
                  - { label: "Texte", name: "text", widget: "markdown" }
                  - { label: "Image", name: "image", widget: "image", required: false }
                  - { label: "Position de l'image", name: "image_position", widget: "select", options: ["droite", "gauche"], default: "droite" }

              - label: "Bandeau / citation"
                name: "bandeau"
                widget: "object"
                fields:
                  - { label: "Titre", name: "title", widget: "string", required: false }
                  - { label: "Texte", name: "text", widget: "markdown" }
                  - { label: "Style", name: "style", widget: "select", options: ["vert", "or", "clair"], default: "vert" }
                  - { label: "Texte du bouton", name: "button_text", widget: "string", required: false }
                  - { label: "Lien du bouton", name: "button_href", widget: "string", required: false }

              - label: "Grille de cartes"
                name: "cartes"
                widget: "object"
                fields:
                  - { label: "Titre de la section", name: "title", widget: "string", required: false }
                  - label: "Cartes"
                    name: "items"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image", required: false }
                      - { label: "Titre", name: "title", widget: "string" }
                      - { label: "Texte", name: "text", widget: "markdown" }

              - label: "Galerie photos"
                name: "galerie"
                widget: "object"
                fields:
                  - { label: "Titre de la section", name: "title", widget: "string", required: false }
                  - label: "Images"
                    name: "images"
                    widget: "list"
                    fields:
                      - { label: "Image", name: "image", widget: "image" }
                      - { label: "Légende", name: "caption", widget: "string", required: false }

      - name: "actualites_section"
        label: "6. Nos réalisations récentes"
        file: "content/home-actualites.json"
        fields:
          - { label: "Accroche", name: "actus_eyebrow", widget: "string", default: "Réalisations" }
          - { label: "Titre de la section", name: "actus_title", widget: "string", default: "Nos réalisations récentes" }

      - name: "cta_footer"
        label: "7. Bandeau de don + Pied de page"
        file: "content/home-cta-footer.json"
        fields:
          - { label: "Titre du bandeau de don", name: "cta_title", widget: "string" }
          - { label: "Texte du bandeau de don", name: "cta_text", widget: "text" }
          - { label: "Texte du bouton du bandeau", name: "cta_button_text", widget: "string", required: false, default: "Accéder à l'espace consultation" }
          - { label: "Lien du bouton du bandeau", name: "cta_button_href", widget: "string", required: false, hint: "URL complète (externe) ou #ancre interne à la page d'accueil.", default: "https://consultations-amstc.org" }
          - { label: "Image de fond du bandeau", name: "cta_bg_image", widget: "image", required: false, hint: "Photo affichée en arrière-plan du bandeau. Conserver un format paysage." }
          - { label: "Description (pied de page)", name: "footer_description", widget: "text" }
          - { label: "Numéro de récépissé", name: "recepisse", widget: "string" }
          - { label: "Téléphone de contact", name: "contact_phone", widget: "string", required: false }
          - { label: "Lien Facebook", name: "lien_facebook", widget: "string", required: false }
          - { label: "Lien LinkedIn", name: "lien_linkedin", widget: "string", required: false }
          - { label: "Lien Instagram", name: "lien_instagram", widget: "string", required: false }
          - { label: "Lien YouTube", name: "lien_youtube", widget: "string", required: false }
          - { label: "Lien TikTok", name: "lien_tiktok", widget: "string", required: false }
          - { label: "Lien Telegram", name: "lien_telegram", widget: "string", required: false }

      - name: "navigation"
        label: "8. Navigation & pied de page (liens)"
        file: "content/navigation.json"
        fields:
          - label: "Sous-menu 'Découvrir l'AMSTC'"
            name: "nav_decouvrir"
            widget: "list"
            hint: "Liens du sous-menu 'Découvrir l'AMSTC', dans le menu du site. L'ordre ici définit l'ordre d'affichage."
            fields:
              - { label: "Texte affiché", name: "label", widget: "string" }
              - { label: "Lien", name: "href", widget: "string", hint: "Ancre de la page d'accueil (ex: #nos-actions), chemin du site (ex: actualites.html), ou URL complète pour un lien externe. Une faute de frappe ici casse le lien." }

          - label: "Sous-menu 'Nos activités'"
            name: "nav_activites"
            widget: "list"
            hint: "Liens du sous-menu 'Nos activités', dans le menu du site. L'ordre ici définit l'ordre d'affichage."
            fields:
              - { label: "Texte affiché", name: "label", widget: "string" }
              - { label: "Lien", name: "href", widget: "string", hint: "Ancre de la page d'accueil (ex: #nos-actions), chemin du site (ex: actualites.html), ou URL complète pour un lien externe. Une faute de frappe ici casse le lien." }

          - label: "Liens du pied de page (colonne 'Pages')"
            name: "footer_pages"
            widget: "list"
            hint: "L'ordre ici définit l'ordre d'affichage dans le pied de page du site."
            fields:
              - { label: "Texte affiché", name: "label", widget: "string" }
              - { label: "Lien", name: "href", widget: "string", hint: "Ancre de la page d'accueil (ex: #nos-actions), chemin du site (ex: actualites.html), ou URL complète pour un lien externe. Une faute de frappe ici casse le lien." }

          - { label: "E-mail de contact (pied de page)", name: "contact_email", widget: "string", pattern: ['^[^\s@]+@[^\s@]+\.[^\s@]+$', "Adresse e-mail invalide."] }

      - name: "mediatheque"
        label: "9. Médiathèque"
        file: "content/mediatheque.json"
        fields:
          - { label: "Accroche", name: "media_eyebrow", widget: "string" }
          - { label: "Titre de la section", name: "media_title", widget: "string" }
          - { label: "Sous-titre", name: "media_subtitle", widget: "text" }
          - label: "Dossiers par année"
            name: "media_years"
            widget: "list"
            hint: "Un dossier par année. L'ordre ici définit l'ordre des onglets affichés sur le site."
            fields:
              - { label: "Année", name: "year", widget: "string" }
              - label: "Photos"
                name: "photos"
                widget: "list"
                field: { label: "Photo", name: "image", widget: "image" }

      - name: "prieres"
        label: "10. Heures de prière"
        file: "content/home-prieres.json"
        fields:
          - { label: "Accroche", name: "prayer_eyebrow", widget: "string", default: "Vie spirituelle" }
          - { label: "Titre de la section", name: "prayer_title", widget: "string", default: "Heures de prière" }
          - { label: "Période (date hijri)", name: "prayer_period_hijri", widget: "string", required: false, hint: "Ex : Du 02 au 08 Safar 1448H" }
          - { label: "Période (date grégorienne)", name: "prayer_period_gregorian", widget: "string", required: false, hint: "Ex : Du vendredi 17 au jeudi 23 juillet 2026" }
          - label: "Heures de la semaine"
            name: "prayer_times"
            widget: "list"
            summary: "{{fields.label}} — {{fields.time}}"
            hint: "À mettre à jour chaque semaine. L'ordre ici définit l'ordre d'affichage."
            fields:
              - { label: "Nom de la prière", name: "label", widget: "string" }
              - { label: "Heure", name: "time", widget: "string", hint: "Ex : 05H35" }

      - name: "impact"
        label: "11. Chiffres d'impact"
        file: "content/home-impact.json"
        fields:
          - { label: "Accroche", name: "impact_eyebrow", widget: "string", default: "Notre impact" }
          - { label: "Titre de la section", name: "impact_title", widget: "string", default: "Ce que nous accomplissons ensemble" }
          - { label: "Sous-titre", name: "impact_subtitle", widget: "string", required: false }
          - label: "Chiffres clés"
            name: "impact_stats"
            widget: "list"
            summary: "{{fields.number}} — {{fields.label}}"
            hint: "4 chiffres maximum recommandés pour rester lisible. Laissez le nombre vide pour masquer une tuile."
            fields:
              - { label: "Nombre", name: "number", widget: "string", required: false, hint: "Ex : 500+, 1 200, 15…" }
              - { label: "Libellé", name: "label", widget: "string" }
              - label: "Icône"
                name: "icon"
                widget: "select"
                default: "stethoscope"
                options:
                  - { label: "Stéthoscope (santé)", value: "stethoscope" }
                  - { label: "Goutte de sang (don de sang)", value: "droplet" }
                  - { label: "Groupe de personnes (membres)", value: "users" }
                  - { label: "Livre (formation / daara)", value: "book" }
                  - { label: "Cœur (social / entraide)", value: "heart" }
                  - { label: "Maison (daara / terrain)", value: "home" }
                  - { label: "Calendrier (activités / événements)", value: "calendar-event" }
                  - { label: "Étoile (récompense / qualité)", value: "star" }

      - name: "temoignages"
        label: "12. Témoignages"
        file: "content/home-temoignages.json"
        fields:
          - { label: "Accroche", name: "temoignages_eyebrow", widget: "string", default: "Témoignages" }
          - { label: "Titre de la section", name: "temoignages_title", widget: "string", default: "Ce qu'ils en disent" }
          - { label: "Sous-titre", name: "temoignages_subtitle", widget: "string", required: false }
          - label: "Témoignages"
            name: "temoignages_list"
            widget: "list"
            summary: "{{fields.author_name}} — {{fields.quote}}"
            hint: "Recueillez toujours l'accord de la personne avant de publier son témoignage."
            fields:
              - { label: "Citation", name: "quote", widget: "text", hint: "Le témoignage tel quel, sans les guillemets." }
              - { label: "Nom", name: "author_name", widget: "string" }
              - { label: "Rôle / contexte", name: "author_role", widget: "string", required: false, hint: "Ex : Bénéficiaire, Daara Serigne Mor Diop ou Membre depuis 2021" }
              - label: "Type"
                name: "author_type"
                widget: "select"
                default: "membre"
                options:
                  - { label: "Bénéficiaire", value: "beneficiaire" }
                  - { label: "Membre", value: "membre" }
              - { label: "Photo", name: "photo", widget: "image", required: false }

      - name: "don"
        label: "Faire un don (page dédiée don.html)"
        file: "content/don.json"
        fields:
          - { label: "Accroche", name: "eyebrow", widget: "string" }
          - { label: "Titre", name: "title", widget: "string" }
          - { label: "Texte d'introduction", name: "intro", widget: "text" }
          - { label: "Titre de la jauge de dons (facultatif)", name: "jauge_titre", widget: "string", required: false, hint: "Ex : Objectif Ndogou Social 2026. Laissez l'objectif ci-dessous à 0 pour masquer toute la jauge." }
          - { label: "Objectif de la jauge (FCFA)", name: "jauge_objectif", widget: "number", default: 0, valueType: "int" }
          - { label: "Montant collecté (FCFA)", name: "jauge_collecte", widget: "number", default: 0, valueType: "int", hint: "À mettre à jour manuellement au fil des dons reçus." }
          - { label: "Titre - Virement bancaire", name: "bank_title", widget: "string" }
          - { label: "Coordonnées bancaires", name: "bank_details", widget: "markdown", hint: "Titulaire, banque, IBAN/RIB, SWIFT..." }
          - { label: "Titre - Mobile Money", name: "mobile_title", widget: "string" }
          - label: "Options Mobile Money"
            name: "mobile_options"
            widget: "list"
            fields:
              - { label: "Opérateur", name: "operator", widget: "string", hint: "Ex: Orange Money, Wave, Free Money…" }
              - { label: "Numéro", name: "number", widget: "string" }
              - { label: "Nom du titulaire", name: "name", widget: "string" }
          - { label: "Titre - Don en nature", name: "nature_title", widget: "string" }
          - { label: "Texte - Don en nature", name: "nature_text", widget: "text" }
          - { label: "Titre - Don institutionnel", name: "institution_title", widget: "string" }
          - { label: "Texte - Don institutionnel", name: "institution_text", widget: "text" }
          - { label: "Note de confiance (récépissé)", name: "trust_note", widget: "string" }

  - name: "actualites"
    label: "Réalisations"
    folder: "content/actualites"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "article.html?slug={{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Résumé (affiché dans la liste)", name: "excerpt", widget: "text" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Vidéo YouTube", name: "video_youtube", widget: "string", required: false, hint: "Lien complet de la vidéo (ex: https://www.youtube.com/watch?v=XXXXXXXXXXX)" }
      - { label: "Contenu de l'article", name: "body", widget: "markdown" }

  - name: "formations"
    label: "Formation"
    folder: "content/formations"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "formation.html?slug={{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Résumé (affiché dans la liste)", name: "excerpt", widget: "text" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Vidéo YouTube", name: "video_youtube", widget: "string", required: false, hint: "Lien complet de la vidéo (ex: https://www.youtube.com/watch?v=XXXXXXXXXXX)" }
      - { label: "Contenu", name: "body", widget: "markdown" }

  - name: "projets"
    label: "Projets"
    folder: "content/projets"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "projet.html?slug={{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Statut", name: "statut", widget: "select", options: ["À venir", "En cours", "Terminé"], default: "En cours" }
      - { label: "Résumé (affiché dans la liste)", name: "excerpt", widget: "text" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Vidéo YouTube", name: "video_youtube", widget: "string", required: false, hint: "Lien complet de la vidéo (ex: https://www.youtube.com/watch?v=XXXXXXXXXXX)" }
      - { label: "Contenu", name: "body", widget: "markdown" }

  - name: "etapes"
    label: "Étapes de projet"
    folder: "content/etapes"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "etape.html?slug={{slug}}"
    fields:
      - { label: "Projet associé", name: "projet", widget: "relation", collection: "projets", search_fields: ["title"], display_fields: ["title"], value_field: "{{slug}}", hint: "Le projet auquel cette étape appartient." }
      - { label: "Titre de l'étape", name: "title", widget: "string" }
      - { label: "Ordre d'affichage", name: "ordre", widget: "number", default: 1, hint: "Détermine la position de l'étape dans la frise (1 = première), indépendamment de la date." }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Résumé (affiché dans la frise du projet)", name: "excerpt", widget: "text" }
      - { label: "Image de couverture", name: "image", widget: "image", required: false }
      - { label: "Vidéo YouTube", name: "video_youtube", widget: "string", required: false, hint: "Lien complet de la vidéo (ex: https://www.youtube.com/watch?v=XXXXXXXXXXX)" }
      - { label: "Contenu de l'étape", name: "body", widget: "markdown" }
