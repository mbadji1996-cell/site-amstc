name: Générer un bilan annuel

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Année du bilan à générer (ex : 2025)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reconstruire l'index de contenu (au cas où)
        run: node scripts/build-content-index.js

      - name: Générer le bilan
        run: node scripts/build-annual-report.js "${{ inputs.year }}"

      - name: Commit et push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rapports/ content/actualites-index.json content/formations-index.json content/projets-index.json content/etapes-index.json
          git diff --cached --quiet || git commit -m "chore: génère le bilan annuel ${{ inputs.year }}"
          git push
