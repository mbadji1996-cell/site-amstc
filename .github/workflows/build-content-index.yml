name: Build content index

on:
  push:
    branches: [main]
    paths:
      - 'content/actualites/**.md'
      - 'content/formations/**.md'
      - 'content/projets/**.md'
      - 'content/etapes/**.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build index files
        run: node scripts/build-content-index.js

      - name: Build sitemap
        run: node scripts/build-sitemap.js

      - name: Commit index files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/actualites-index.json content/formations-index.json content/projets-index.json content/etapes-index.json sitemap.xml
          git diff --cached --quiet || git commit -m "chore: rebuild content index et sitemap"
          git push
